<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>About</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}

.header{
position:sticky;top:0;background:#004d40;color:white;
display:flex;align-items:center;height:40px;
}
.menu-icon{position:absolute;left:10px;font-size:20px;cursor:pointer;}
.title{width:100%;text-align:center;}

.dropdown{
position:fixed;top:0;left:-260px;width:220px;height:100%;
background:white;transition:0.3s;padding-top:50px;z-index:2000;
}
.dropdown a{
display:block;padding:14px;color:#004d40;text-decoration:none;border-bottom:1px solid #eee;
}

.section{padding:10px;}
</style>
</head>

<body>

<div class="header">
<div class="menu-icon" onclick="toggleMenu()">☰</div>
<div class="title">🌿 Moolika Foods — From Soil to Table</div>
</div>

<div id="menu" class="dropdown">
<a href="index.html">🏠 Home</a>
<a href="products.html">🛒 Products</a>
<a href="about.html">ℹ️ About</a>
</div>

<div class="section">
<img src="brochure.png" style="width:100%;border-radius:10px;">
</div>

<script>
function toggleMenu(){
var m=document.getElementById("menu");
m.style.left=(m.style.left==="0px")?"-260px":"0px";
}
</script>

</body>
</html>
