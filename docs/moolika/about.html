<!DOCTYPE html>
<html>

<title>About</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;padding-bottom:80px;}

.header{
  position:sticky;top:0;background:#004d40;color:white;
  display:flex;align-items:center;height:40px;
}

.menu-icon{position:absolute;left:10px;font-size:20px;cursor:pointer;}

.title{width:100%;text-align:center;font-size:13px;}

.dropdown{
  position:fixed;top:0;left:-260px;width:220px;height:100%;
  background:white;transition:0.3s;padding-top:50px;
}

.dropdown a{display:block;padding:14px;color:#004d40;text-decoration:none;}

.section{
  background:white;margin:10px;padding:12px;border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
  <div class="menu-icon" onclick="toggleMenu()">☰</div>
  <div class="title">🌿 Moolika Foods — From Soil to Table</div>
</div>

<div id="menu" class="dropdown">
  <a href="index.html">🏠 Home</a>
  <a href="products.html">🛒 Products</a>
  <a href="about.html">ℹ️ About</a>
</div>

<!-- BROCHURE IMAGE -->
<div class="section">
<img src="brochure.jpg" style="width:100%;border-radius:10px;">
</div>

<div class="section">
<h3>About</h3>
<p>Natural food directly from farmers.</p>
</div>

<script>
function toggleMenu(){
  var m=document.getElementById("menu");
  m.style.left=(m.style.left==="0px")?"-260px":"0px";
}
</script>

</body>
</html>
