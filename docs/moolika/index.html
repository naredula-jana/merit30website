<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}

.section{
padding:10px;
font-weight:bold;
color:#004d40;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

button{
padding:6px;
margin-top:5px;
background:#004d40;
color:white;
border:none;
border-radius:5px;
}

select{
width:100%;
padding:5px;
margin-top:5px;
}

.cart{
background:white;
margin:10px;
padding:10px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<!-- PRODUCTS -->
<div id="products"></div>

<!-- CART -->
<div class="cart">
<h3>Cart 🛒</h3>

<div id="cart"></div>

<p>Total ₹<span id="total">0</span></p>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Place Order</button>

</div>

<!-- SCRIPTS -->
<script src="header.js"></script>
<script src="products.js"></script>
<script src="cart.js"></script>
<script src="order.js"></script>

<script>

// ===== RENDER PRODUCTS =====
function render(){

var html="";
var categories = ["grains","millets","oils","misc"];

for(var c=0;c<categories.length;c++){

var cat = categories[c];

var items = allProducts.filter(p => p.category === cat);

html += '<div class="section">'+cat.toUpperCase()+'</div>';
html += '<div class="grid">';

for(var i=0;i<items.length;i++){

var p = items[i];

var options = "";

for(var j=0;j<p.sizes.length;j++){
options += '<option value="'+p.sizes[j]+'">'+p.sizes[j]+'kg</option>';
}

html += '<div class="card">';
html += '<b>'+p.name+'</b>';
html += '<div>₹'+p.price+'</div>';

html += '<select id="size_'+p.name+'">';
html += options;
html += '</select>';

html += '<button onclick="addItem(\''+p.name+'\','+p.price+')">Add</button>';

html += '</div>';
}

html += '</div>';
}

document.getElementById("products").innerHTML = html;
}

// ===== INIT =====
window.onload = function(){

loadHeader();
render();
renderCart();

};

</script>

</body>
</html>
