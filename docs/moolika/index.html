<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

.header{
background:#004d40;color:#fff;height:40px;
display:flex;align-items:center;
}

.menu{position:absolute;left:10px;font-size:20px;cursor:pointer;}
.title{text-align:center;width:100%;}

.dropdown{
position:fixed;top:0;left:-220px;width:200px;height:100%;
background:#fff;transition:.3s;padding-top:40px;
z-index:2000;
}

.dropdown a{
display:block;
padding:12px;
color:#004d40;
text-decoration:none;
border-bottom:1px solid #eee;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
padding:8px;
}

.card{background:#fff;padding:8px;text-align:center;}
button{background:#004d40;color:#fff;border:none;padding:6px;}

#mini{
position:fixed;bottom:0;width:100%;
background:#004d40;color:#fff;padding:10px;
display:flex;justify-content:space-between;
}
</style>
</head>

<body>

<div class="header">
<div class="menu" onclick="menu()">☰</div>
<div class="title">🌿 Moolika Foods</div>
</div>

<div id="menuBox" class="dropdown">
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="about.html">About</a>
</div>

<h3 style="padding:10px;">Featured</h3>
<div id="list" class="grid"></div>

<div id="mini">
<span>₹ <span id="total">0</span></span>
<a href="products.html" style="color:#fff;">Cart</a>
</div>

<script>
function menu(){
var m=document.getElementById("menuBox");
m.style.left=(m.style.left==="0px")?"-220px":"0px";
}

var p=[
{name:"Rice",price:60},
{name:"Wheat",price:50}
];

var h="";
p.forEach(x=>{
h+=`<div class="card">
${x.name}<br>₹${x.price}<br>
<button onclick="add('${x.name}',${x.price})">Add</button>
</div>`;
});
list.innerHTML=h;

/* CART FIX */
function getCart(){
return JSON.parse(localStorage.cart||"{}");
}

function add(n,p){
var c=getCart();
c[n]=c[n]||{p:Number(p),q:0};
c[n].q=(c[n].q||0)+1;
localStorage.cart=JSON.stringify(c);
totalCalc();
}

function totalCalc(){
var c=getCart(),t=0;

for(var k in c){
var item=c[k];
var price=item.p||item.price||0;
var qty=item.q||item.qty||0;
t+=price*qty;
}

document.getElementById("total").innerHTML=t;
}

totalCalc();
</script>

</body>
</html>
