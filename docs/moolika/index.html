<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}

header{
background:#2e7d32;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
}

.hero{
background:#e8f5e9;
text-align:center;
padding:12px;
font-weight:bold;
color:#2e7d32;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:8px;
padding:8px;
text-align:center;
}

.price{color:green;font-weight:bold;}
.old{text-decoration:line-through;color:#777;font-size:12px;}

button{
background:#2e7d32;
color:white;
border:none;
padding:6px;
border-radius:5px;
width:100%;
}

.cart{padding:10px;background:white;margin:10px;border-radius:8px;}
</style>
</head>

<body>

<header>
<div><b>🌿 MOOLIKA FOODS</b></div>
<div>📞 9XXXXXXXXX</div>
</header>

<div class="hero">
Healthy Food at Affordable Price
</div>

<div id="products" class="products"></div>

<div class="cart">
<h3>Cart</h3>
<div id="cart">Empty</div>
<p>Total ₹<span id="total">0</span></p>

<input id="phone" placeholder="Phone">
<button onclick="placeOrder()">Place Order</button>
</div>

<script>

// Agent
let agentId="DIRECT";
let p=new URLSearchParams(window.location.search);
if(p.get("agent")) agentId=p.get("agent");

// Data
let products=[
{name:"Rice",price:60,old:70,img:"rice.jpg"},
{name:"Wheat",price:50,img:"wheat.jpg"},
{name:"Ragi",price:70,img:"ragi.jpg"},
{name:"Foxtail",price:90,img:"foxtail.jpg"}
];

let cart=[];

// Render
let div=document.getElementById("products");

products.forEach((x,i)=>{
div.innerHTML+=`
<div class="card">
<img src="${x.img}" width="100%">
<h4>${x.name}</h4>
${x.old?`<span class="old">₹${x.old}</span>`:""}
<div class="price">₹${x.price}</div>
<button onclick="add(${i})">Add</button>
</div>`;
});

// Add
function add(i){
cart.push(products[i]);
render();
}

// Render cart
function render(){
let html="",t=0;

cart.forEach((x,i)=>{
t+=x.price;
html+=`${x.name} ₹${x.price}<br>`;
});

document.getElementById("cart").innerHTML=html||"Empty";
document.getElementById("total").innerText=t;
}

// Order
function placeOrder(){
let phone=document.getElementById("phone").value;
if(!phone) return alert("Enter phone");

let orderId="ORD"+Date.now();

let url="https://script.google.com/macros/s/AKfycbyiSzKMSOQzxYceiq6_vUh5P82zF2OtATCi2DOAuUzOKxSvyII0pGeTrlSL2_JHP0I/exec"
+"?orderId="+orderId
+"&phone="+phone
+"&total="+document.getElementById("total").innerText
+"&agentId="+agentId;

new Image().src=url;

alert("Order placed "+orderId);

cart=[];
render();
}

</script>

</body>
</html>
