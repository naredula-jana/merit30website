<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods v45</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
header{background:#004d40;color:white;padding:12px;display:flex;justify-content:space-between;}
.hero{background:#c8e6c9;text-align:center;padding:10px;font-weight:bold;}

.nav{display:flex;gap:10px;padding:10px;background:#e0f2f1;justify-content:center;}
.nav a{text-decoration:none;color:#004d40;font-weight:bold;}

.filters{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px;}
.filters button{padding:8px;background:#004d40;color:white;border:none;border-radius:6px;}

.section{padding:10px;font-weight:bold;color:#004d40;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px;}

.card{background:white;padding:10px;border-radius:10px;text-align:center;}
.card img{width:100%;height:80px;object-fit:cover;border-radius:6px;}
.card select{margin-top:5px;padding:5px;width:100%;}

.price{font-weight:bold;color:#004d40;}
button{width:100%;padding:6px;margin-top:5px;background:#004d40;color:white;border:none;border-radius:5px;}

.cart{background:white;margin:10px;padding:10px;border-radius:10px;}
.cart-item{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;padding:6px 0;}

.controls button{width:auto;padding:5px;margin:0 2px;}
.plus{background:#4caf50;}
.minus{background:#f44336;}
.delete{background:#999;}

input,textarea{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:1px solid #ccc;}
</style>
</head>

<body>

<header>
<div>🌿 MOOLIKA FOODS</div>
<div>📞 99999-00045</div>
</header>

<div class="nav">
<a href="index.html">Home</a>
<a href="grains.html">Grains</a>
</div>

<div class="hero">Healthy • Affordable • Diabetic Friendly</div>

<div class="filters">
<button onclick="setFilter('all')">All</button>
<button onclick="setFilter('organic')">Organic</button>
<button onclick="setFilter('budget')">Budget</button>
<button onclick="setFilter('diabetic')">Diabetic</button>
</div>

<div id="products"></div>

<div class="cart">
<h3>Cart</h3>
<div id="cart"></div>
<p>Total ₹<span id="total">0</span></p>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Place Order</button>
</div>

<script src="products.js"></script>

<script>

var cart = JSON.parse(localStorage.getItem("cart") || "{}");
var currentFilter="all";

function setFilter(f){currentFilter=f;render();}

function render(){

var html="";
var categories=["grains","millets","oils","misc"];

for(var c of categories){

var items=allProducts.filter(p=>p.category===c);

html+=`<div class="section">${c.toUpperCase()}</div><div class="grid">`;

for(var p of items){

if(currentFilter==="organic"&&!p.organic)continue;
if(currentFilter==="budget"&&p.price>70)continue;
if(currentFilter==="diabetic"&&!p.diabetic)continue;

var options=p.sizes.map(s=>`<option>${s}kg</option>`).join("");

html+=`
<div class="card">
<img src="${p.name.toLowerCase().replace(/\s/g,'')}.jpg" onerror="this.style.display='none'">
<b>${p.name}</b>
<div class="price">₹${p.price}/kg</div>
<select id="size_${p.name}">${options}</select>
<button onclick="addItem('${p.name}',${p.price})">Add</button>
</div>`;
}

html+="</div>";
}

document.getElementById("products").innerHTML=html;
}

function addItem(name,price){
var size=document.getElementById("size_"+name).value;
var key=name+"_"+size;

cart[key]=cart[key]||{name,size,price,qty:0};
cart[key].qty++;

saveCart();
}

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

function renderCart(){
var html="",total=0;

for(var k in cart){
var i=cart[k];
var t=i.price*parseInt(i.size)*i.qty;
total+=t;

html+=`${i.name}(${i.size})x${i.qty}
<button onclick="cart[k].qty++;saveCart()">+</button>
<button onclick="cart[k].qty--;if(cart[k].qty<=0)delete cart[k];saveCart()">-</button><br>`;
}

document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerHTML=total;
}

function placeOrder(){
alert("Order placed (same logic continues)");
cart={};saveCart();
}

render();
renderCart();

</script>

</body>
</html>
