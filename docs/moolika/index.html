<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods v47</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}
header{background:#004d40;color:white;padding:12px;display:flex;justify-content:space-between;}
.nav{display:flex;gap:10px;padding:10px;background:#e0f2f1;justify-content:center;}
.nav a{text-decoration:none;color:#004d40;font-weight:bold;}

.hero{background:#c8e6c9;text-align:center;padding:10px;font-weight:bold;}

.section{padding:10px;font-weight:bold;color:#004d40;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px;}

.card{background:white;padding:10px;border-radius:10px;text-align:center;}
.price{font-weight:bold;color:#004d40;}
button{width:100%;padding:6px;margin-top:5px;background:#004d40;color:white;border:none;border-radius:5px;}

.cart{background:white;margin:10px;padding:10px;border-radius:10px;}
input,textarea{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:1px solid #ccc;}
</style>
</head>

<body>

<header>
<div>🌿 MOOLIKA FOODS</div>
<div>📞 99999-00047</div>
</header>

<div class="nav">
<a href="index.html">Home</a>
<a href="grains.html">Grains</a>
<a href="millets.html">Millets</a>
<a href="oils.html">Oils</a>
<a href="misc.html">Misc</a>
</div>

<div class="hero">
Healthy • Affordable • Diabetic Friendly
</div>

<div id="products"></div>

<div class="cart">
<h3>Cart 🛒</h3>
<div id="cart"></div>
<p>Total ₹<span id="total">0</span></p>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Place Order</button>
</div>

<script src="products.js"></script>

<script>
var cart = JSON.parse(localStorage.getItem("cart")||{});

function render(){
var html="";
var categories=["grains","millets","oils","misc"];

for(var cat of categories){
var items=allProducts.filter(p=>p.category===cat);

html+=`<div class="section">${cat.toUpperCase()}</div><div class="grid">`;

for(var p of items){
var options=p.sizes.map(s=>`<option>${s}kg</option>`).join("");

html+=`
<div class="card">
<b>${p.name}</b>
<div class="price">₹${p.price}/kg</div>
<select id="size_${p.name}">${options}</select>
<button onclick="addItem('${p.name}',${p.price})">Add</button>
</div>`;
}

html+="</div>";
}

document.getElementById("products").innerHTML=html;
}

function addItem(name,price){
var size=document.getElementById("size_"+name).value;
var key=name+"_"+size;

cart[key]=cart[key]||{name,size,price,qty:0};
cart[key].qty++;

saveCart();
}

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

function renderCart(){
var html="",total=0;
for(var k in cart){
var i=cart[k];
var t=i.price*i.size*i.qty;
total+=t;
html+=`${i.name}(${i.size}) x ${i.qty} = ₹${t}<br>`;
}
document.getElementById("cart").innerHTML=html||"Empty";
document.getElementById("total").innerHTML=total;
}

function placeOrder(){
var name=nameInput.value;
var phone=phoneInput.value;
var address=addressInput.value;

if(!name||!phone||!address){alert("Fill all details");return;}

var text="";
for(var k in cart){
var i=cart[k];
text+=i.name+"("+i.size+")x"+i.qty+", ";
}

var url="YOUR_SCRIPT_URL"
+"?name="+encodeURIComponent(name)
+"&phone="+encodeURIComponent(phone)
+"&address="+encodeURIComponent(address)
+"&cart="+encodeURIComponent(text);

new Image().src=url;

alert("Order placed");
cart={};saveCart();
}

render();
renderCart();
</script>

</body>
</html>
