<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}

header{
background:#2e7d32;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
}

.hero{
background:#e8f5e9;
text-align:center;
padding:10px;
color:#2e7d32;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:8px;
padding:8px;
text-align:center;
}

.card img{
width:100%;
height:100px;
object-fit:cover;
}

.price{color:green;font-weight:bold;}
.old{text-decoration:line-through;color:#777;font-size:12px;}

button{
background:#2e7d32;
color:white;
border:none;
padding:6px;
border-radius:5px;
width:100%;
}

.cart{
background:white;
margin:10px;
padding:10px;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<div><b>🌿 MOOLIKA FOODS</b></div>
<div>📞 9XXXXXXXXX</div>
</header>

<div class="hero">
🌿 Healthy Food at Affordable Prices
</div>

<div id="products" class="products"></div>

<div class="cart">
<h3>Cart</h3>
<div id="cart">Empty</div>
<p>Total ₹<span id="total">0</span></p>

<input id="phone" placeholder="Phone">
<button onclick="placeOrder()">Place Order</button>
</div>

<script>

// Agent
let agentId="DIRECT";
let params=new URLSearchParams(window.location.search);
if(params.has("agent")) agentId=params.get("agent");

// FULL PRODUCT LIST
let products=[
{name:"Sona Masuri Rice",price:60,old:70,img:"rice.jpg"},
{name:"Raw Rice",price:55,img:"rice2.jpg"},
{name:"Brown Rice",price:80,img:"brown.jpg"},

{name:"Wheat",price:50,img:"wheat.jpg"},
{name:"Wheat Flour",price:55,img:"wheat-flour.jpg"},

{name:"Jowar",price:60,img:"jowar.jpg"},
{name:"Jowar Flour",price:70,img:"jowar-flour.jpg"},

{name:"Foxtail Millet",price:90,img:"foxtail.jpg"},
{name:"Little Millet",price:95,img:"little.jpg"},
{name:"Kodo Millet",price:100,img:"kodo.jpg"},
{name:"Barnyard Millet",price:105,img:"barnyard.jpg"},
{name:"Proso Millet",price:90,img:"proso.jpg"},
{name:"Bajra",price:60,img:"bajra.jpg"},
{name:"Ragi",price:70,img:"ragi.jpg"}
];

let cart=[];

// Render products
let container=document.getElementById("products");

for(let i=0;i<products.length;i++){

let p=products[i];

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${p.img}">
<h4>${p.name}</h4>
${p.old?`<span class="old">₹${p.old}</span>`:""}
<div class="price">₹${p.price}/kg</div>
<button onclick="addToCart(${i})">Add</button>
`;

container.appendChild(card);
}

// Add to cart
function addToCart(i){
cart.push(products[i]);
renderCart();
}

// Render cart
function renderCart(){
let html="";
let total=0;

for(let i=0;i<cart.length;i++){
html+=cart[i].name+" ₹"+cart[i].price+"<br>";
total+=cart[i].price;
}

document.getElementById("cart").innerHTML=html||"Empty";
document.getElementById("total").innerText=total;
}

// Place order
function placeOrder(){

let phone=document.getElementById("phone").value;
if(!phone){
alert("Phone required");
return;
}

let orderId="ORD"+Date.now();

let url="https://script.google.com/macros/s/AKfycbyiSzKMSOQzxYceiq6_vUh5P82zF2OtATCi2DOAuUzOKxSvyII0pGeTrlSL2_JHP0I/exec"
+"?orderId="+orderId
+"&phone="+phone
+"&total="+document.getElementById("total").innerText
+"&agentId="+agentId;

new Image().src=url;

alert("Order placed: "+orderId);

cart=[];
renderCart();
}

</script>

</body>
</html>
