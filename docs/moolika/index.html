<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods v44</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}

header{
background:#004d40;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
}

.hero{
background:#c8e6c9;
text-align:center;
padding:10px;
font-weight:bold;
}

.filters{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
padding:10px;
}

.filters button{
padding:8px;
background:#004d40;
color:white;
border:none;
border-radius:6px;
}

.section{
padding:10px;
font-weight:bold;
color:#004d40;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
height:80px;
object-fit:cover;
border-radius:6px;
}

.card select{
margin-top:5px;
padding:5px;
width:100%;
}

.price{font-weight:bold;color:#004d40;}

button{
width:100%;
padding:6px;
margin-top:5px;
background:#004d40;
color:white;
border:none;
border-radius:5px;
}

.cart{
background:white;
margin:10px;
padding:10px;
border-radius:10px;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #eee;
padding:6px 0;
font-size:14px;
}

.controls button{
width:auto;
padding:6px 8px;
margin:0 2px;
font-size:14px;
}

.plus{background:#4caf50;}
.minus{background:#f44336;}
.delete{background:#999;}

input,textarea{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<header>
<div>🌿 MOOLIKA FOODS</div>
<div>📞 99999-00044</div>
</header>

<div class="hero">
Healthy • Affordable • Diabetic Friendly
</div>

<div class="filters">
<button onclick="setFilter('all')">All</button>
<button onclick="setFilter('organic')">🌿 Organic</button>
<button onclick="setFilter('budget')">💰 Budget</button>
<button onclick="setFilter('diabetic')">🩺 Diabetic</button>
</div>

<div id="products"></div>

<div class="cart">
<h3>Cart 🛒</h3>
<div id="cart">Empty</div>
<p>Total ₹<span id="total">0</span></p>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Place Order</button>
</div>

<!-- ✅ CENTRAL PRODUCT FILE -->
<script src="products.js"></script>

<script>

// AGENT
var agentId="DIRECT";
if(window.location.search.indexOf("agent=")!==-1){
agentId=window.location.search.split("agent=")[1].split("&")[0];
}

var currentFilter="all";
var cart={};

// RENDER PRODUCTS
function render(){

var html="";

var categories = ["grains","millets","oils","misc"];

for(var c=0;c<categories.length;c++){

var cat = categories[c];
var items = allProducts.filter(p => p.category === cat);

if(items.length===0) continue;

html+=`<div class="section">${cat.toUpperCase()}</div><div class="grid">`;

for(var i=0;i<items.length;i++){

var p=items[i];

// FILTERS
if(currentFilter==="organic" && !p.organic) continue;
if(currentFilter==="budget" && p.price>70) continue;
if(currentFilter==="diabetic" && !p.diabetic) continue;

// SIZE OPTIONS
var options="";
for(var j=0;j<p.sizes.length;j++){
options+=`<option value="${p.sizes[j]}">${p.sizes[j]}kg</option>`;
}

html+=`
<div class="card">
<img src="${p.name.toLowerCase().replace(/\s/g,'')}.jpg"
     onerror="this.style.display='none'">

<b>${p.name}</b>
<div class="price">₹${p.price}/kg</div>

<select id="size_${p.name}">${options}</select>

<button onclick="addItem('${p.name}',${p.price})">Add</button>
</div>
`;
}

html+=`</div>`;
}

document.getElementById("products").innerHTML=html;
}

// FILTER
function setFilter(type){
currentFilter=type;
render();
}

// ADD ITEM
function addItem(name,price){

var size=document.getElementById("size_"+name).value;
var key=name+"_"+size;

if(cart[key]){
cart[key].qty++;
}else{
cart[key]={name:name,size:size,price:price,qty:1};
}

renderCart();
}

// CART CONTROLS
function increase(k){cart[k].qty++;renderCart();}
function decrease(k){cart[k].qty--;if(cart[k].qty<=0) delete cart[k];renderCart();}
function removeItem(k){delete cart[k];renderCart();}

// RENDER CART
function renderCart(){

var html="";
var total=0;

for(var k in cart){

var i=cart[k];
var t=i.price*i.size*i.qty;
total+=t;

html+=`
<div class="cart-item">
${i.name} (${i.size}kg)x${i.qty}
<div class="controls">
<button class="minus" onclick="decrease('${k}')">−</button>
<button class="plus" onclick="increase('${k}')">+</button>
<button class="delete" onclick="removeItem('${k}')">×</button>
</div>
</div>
`;
}

document.getElementById("cart").innerHTML=html||"Empty";
document.getElementById("total").innerHTML=total;
}

// CART STRING
function getCartDetails(){
var text="";
for(var k in cart){
var i=cart[k];
text+=i.name+"("+i.size+"kg)x"+i.qty+", ";
}
return text;
}

// ORDER
function placeOrder(){

var name=document.getElementById("name").value;
var phone=document.getElementById("phone").value;
var address=document.getElementById("address").value;

if(!name||!phone||!address){
alert("Fill all details");
return;
}

var cartDetails=getCartDetails();
if(!cartDetails){
alert("Cart empty");
return;
}

var orderId="ORD"+new Date().getTime();

var url="https://script.google.com/macros/s/AKfycbyiSzKMSOQzxYceiq6_vUh5P82zF2OtATCi2DOAuUzOKxSvyII0pGeTrlSL2_JHP0I/exec"
+"?orderId="+encodeURIComponent(orderId)
+"&name="+encodeURIComponent(name)
+"&phone="+encodeURIComponent(phone)
+"&address="+encodeURIComponent(address)
+"&cart="+encodeURIComponent(cartDetails)
+"&total="+encodeURIComponent(document.getElementById("total").innerHTML)
+"&agentId="+encodeURIComponent(agentId);

new Image().src=url;

alert("Order placed "+orderId);

cart={};
renderCart();
}

// INIT
render();

</script>

</body>
</html>
