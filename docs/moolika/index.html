<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}

header{
background:#2e7d32;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
}

.hero{
background:#e8f5e9;
text-align:center;
padding:10px;
font-weight:bold;
color:#2e7d32;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
padding:8px;
border-radius:8px;
text-align:center;
}

.card img{
width:100%;
height:90px;
object-fit:cover;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:6px;
width:100%;
border-radius:5px;
}

.cart{
background:white;
margin:10px;
padding:10px;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<div><b>🌿 MOOLIKA FOODS</b></div>
<div>📞 9XXXXXXXXX</div>
</header>

<div class="hero">
Healthy & Affordable Food
</div>

<div id="products" class="grid"></div>

<div class="cart">
<h3>Cart</h3>
<div id="cart">Empty</div>
<p>Total ₹<span id="total">0</span></p>
<input id="phone" placeholder="Phone">
<button onclick="placeOrder()">Place Order</button>
</div>

<script>

// -------- SIMPLE GLOBAL --------
var products = [
"Sona Masuri Rice|60",
"Raw Rice|55",
"Brown Rice|80",
"Wheat|50",
"Wheat Flour|55",
"Jowar|60",
"Jowar Flour|70",
"Foxtail Millet|90",
"Little Millet|95",
"Kodo Millet|100",
"Barnyard Millet|105",
"Proso Millet|90",
"Bajra|60",
"Ragi|70"
];

var cart = [];

// -------- RENDER PRODUCTS --------
var container = document.getElementById("products");

for(var i=0;i<products.length;i++){

var parts = products[i].split("|");
var name = parts[0];
var price = parseInt(parts[1]);

var div = document.createElement("div");
div.className = "card";

div.innerHTML =
"<h4>"+name+"</h4>"+
"<div>₹"+price+"/kg</div>"+
"<button onclick='addItem("+i+")'>Add</button>";

container.appendChild(div);
}

// -------- ADD --------
function addItem(i){
cart.push(products[i]);
renderCart();
}

// -------- CART --------
function renderCart(){
var html = "";
var total = 0;

for(var i=0;i<cart.length;i++){
var parts = cart[i].split("|");
html += parts[0] + " ₹" + parts[1] + "<br>";
total += parseInt(parts[1]);
}

document.getElementById("cart").innerHTML = html || "Empty";
document.getElementById("total").innerHTML = total;
}

// -------- ORDER --------
function placeOrder(){

var phone = document.getElementById("phone").value;
if(!phone){
alert("Enter phone");
return;
}

var orderId = "ORD" + new Date().getTime();

// agent
var agentId = "DIRECT";
var urlParams = new URLSearchParams(window.location.search);
if(urlParams.get("agent")) agentId = urlParams.get("agent");

var url = "https://script.google.com/macros/s/AKfycbyiSzKMSOQzxYceiq6_vUh5P82zF2OtATCi2DOAuUzOKxSvyII0pGeTrlSL2_JHP0I/exec"
+"?orderId="+orderId
+"&phone="+phone
+"&total="+document.getElementById("total").innerHTML
+"&agentId="+agentId;

var img = new Image();
img.src = url;

alert("Order placed: " + orderId);

cart = [];
renderCart();
}

</script>

</body>
</html>
