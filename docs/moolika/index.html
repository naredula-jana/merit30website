<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods v41</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}

header{
background:#004d40;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
}

.hero{
background:#c8e6c9;
text-align:center;
padding:10px;
font-weight:bold;
}

.filters{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
padding:10px;
}

.filters button{
padding:8px;
background:#004d40;
color:white;
border:none;
border-radius:6px;
}

.section{
padding:10px;
font-weight:bold;
color:#004d40;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.card select{
margin-top:5px;
padding:5px;
width:100%;
}

.price{font-weight:bold;color:#004d40;}

button{
width:100%;
padding:6px;
margin-top:5px;
background:#004d40;
color:white;
border:none;
border-radius:5px;
}

.cart{
background:white;
margin:10px;
padding:10px;
border-radius:10px;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #eee;
padding:6px 0;
font-size:14px;
}

.controls button{
width:auto;
padding:6px 8px;
margin:0 2px;
font-size:14px;
}

.plus{background:#4caf50;}
.minus{background:#f44336;}
.delete{background:#999;}

input,textarea{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<header>
<div>🌿 MOOLIKA FOODS</div>
<div>📞 99999-00041</div>
</header>

<div class="hero">
Healthy • Affordable • Diabetic Friendly
</div>

<div class="filters">
<button onclick="setFilter('all')">All</button>
<button onclick="setFilter('organic')">🌿 Organic</button>
<button onclick="setFilter('budget')">💰 Budget</button>
<button onclick="setFilter('diabetic')">🩺 Diabetic</button>
</div>

<div id="products"></div>

<div class="cart">
<h3>Cart 🛒</h3>
<div id="cart">Empty</div>
<p>Total ₹<span id="total">0</span></p>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Place Order</button>
</div>

<script>

// AGENT
var agentId="DIRECT";
if(window.location.search.indexOf("agent=")!==-1){
agentId=window.location.search.split("agent=")[1].split("&")[0];
}

var currentFilter="all";
var cart={};

// PRODUCTS
var categories=[

{
name:"🌾 Grains",
items:[
["Rice",60,true,false,[5,20]],
["Wheat",50,false,false,[5,10]],
["Jowar",60,true,true,[5,10]]
]
},

{
name:"🌿 Millets",
items:[
["Ragi",70,true,true,[5]],
["Foxtail",90,true,true,[5]]
]
}

];

// RENDER PRODUCTS
function render(){

var html="";

for(var c=0;c<categories.length;c++){

html+=`<div class="section">${categories[c].name}</div><div class="grid">`;

for(var i=0;i<categories[c].items.length;i++){

var p=categories[c].items[i];

if(currentFilter==="organic" && !p[2]) continue;
if(currentFilter==="budget" && p[1]>70) continue;
if(currentFilter==="diabetic" && !p[3]) continue;

// BAG OPTIONS
var options="";
for(var j=0;j<p[4].length;j++){
options+=`<option value="${p[4][j]}">${p[4][j]}kg</option>`;
}

html+=`
<div class="card">
<b>${p[0]}</b>
<div class="price">₹${p[1]}/kg</div>

<select id="size_${p[0]}">
${options}
</select>

<button onclick="addItem('${p[0]}',${p[1]})">Add</button>
</div>
`;
}

html+=`</div>`;
}

document.getElementById("products").innerHTML=html;
}

// FILTER
function setFilter(type){
currentFilter=type;
render();
}

// ADD ITEM
function addItem(name,price){

var size=document.getElementById("size_"+name).value;
var key=name+"_"+size;

if(cart[key]){
cart[key].qty++;
}else{
cart[key]={name:name,size:size,price:price,qty:1};
}

renderCart();
}

// CONTROLS
function increase(key){cart[key].qty++;renderCart();}
function decrease(key){cart[key].qty--;if(cart[key].qty<=0) delete cart[key];renderCart();}
function removeItem(key){delete cart[key];renderCart();}

// CART RENDER
function renderCart(){

var html="";
var total=0;

for(var key in cart){

var item=cart[key];
var t=item.price*item.size*item.qty;
total+=t;

html+=`
<div class="cart-item">
<div>
${item.name} (${item.size}kg) x ${item.qty}
</div>

<div class="controls">
<button class="minus" onclick="decrease('${key}')">➖</button>
<button class="plus" onclick="increase('${key}')">➕</button>
<button class="delete" onclick="removeItem('${key}')">❌</button>
</div>
</div>
`;
}

document.getElementById("cart").innerHTML=html||"Empty";
document.getElementById("total").innerHTML=total;
}

// CART STRING
function getCartDetails(){
var text="";
for(var key in cart){
var item=cart[key];
text+=item.name+"("+item.size+"kg)x"+item.qty+", ";
}
return text;
}

// ORDER
function placeOrder(){

var name=document.getElementById("name").value;
var phone=document.getElementById("phone").value;
var address=document.getElementById("address").value;

if(!name||!phone||!address){
alert("Fill all details");
return;
}

var cartDetails=getCartDetails();
if(!cartDetails){
alert("Cart empty");
return;
}

var orderId="ORD"+new Date().getTime();

var url="https://script.google.com/macros/s/AKfycbyiSzKMSOQzxYceiq6_vUh5P82zF2OtATCi2DOAuUzOKxSvyII0pGeTrlSL2_JHP0I/exec"
+"?orderId="+encodeURIComponent(orderId)
+"&name="+encodeURIComponent(name)
+"&phone="+encodeURIComponent(phone)
+"&address="+encodeURIComponent(address)
+"&cart="+encodeURIComponent(cartDetails)
+"&total="+encodeURIComponent(document.getElementById("total").innerHTML)
+"&agentId="+encodeURIComponent(agentId);

new Image().src=url;

alert("Order placed "+orderId);

cart={};
renderCart();
}

// INIT
render();

</script>

</body>
</html>
