<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moolika Foods</title>

<style>
body { font-family: Arial; margin: 0; background: #f7f7f7; }

/* HEADER */
header {
    background:#2e7d32;
    color:white;
    padding:10px 20px;
    display:flex;
    justify-content:space-between;
}

/* SECTION */
section { padding:15px; max-width:1000px; margin:auto; }

/* GRID */
.products {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap:12px;
}

/* CARD */
.card {
    background:white;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img {
    width:100%;
    height:100px;
    object-fit:cover;
}

.card-content {
    padding:10px;
    text-align:center;
}

.card-content h3 {
    font-size:14px;
    margin-bottom:8px;
}

/* BUTTON */
button {
    background:#2e7d32;
    color:white;
    padding:10px;
    border:none;
    border-radius:8px;
    width:100%;
    font-size:14px;
}

button:active { transform: scale(0.95); }

.added { background:#4caf50 !important; }

/* INPUT */
select, input, textarea {
    width:100%;
    padding:8px;
    margin:5px 0;
    border-radius:6px;
}

/* CART */
.cart {
    background:white;
    padding:10px;
    border-radius:10px;
}

/* COMPACT CART ROW */
.cart-row {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:6px 0;
    border-bottom:1px solid #eee;
    font-size:14px;
}

.delete-btn {
    background:red;
    color:white;
    border:none;
    border-radius:6px;
    padding:5px 8px;
}

/* CONFIRMATION */
.confirmation {
    display:none;
    text-align:center;
    padding:40px;
}
</style>
</head>

<body>

<header>
<div>
<b>🌿 MOOLIKA FOODS</b><br>
<small>From Soil to Table</small>
</div>
<div>📞 9XXXXXXXXX</div>
</header>

<!-- RICE -->
<section>
<h2>🌾 Rice (బియ్యం)</h2>
<div class="products">

<div class="card">
<img src="rice.jpg">
<div class="card-content">
<h3>Sona Masuri (సోనా మసూరి) - ₹60/kg</h3>

<select id="qty1">
<option value="1">1 kg</option>
<option value="5" selected>5 kg</option>
<option value="10">10 kg</option>
<option value="50">50 kg</option>
</select>

<select id="unit1">
<option value="1">1 bag</option>
<option value="2">2 bags</option>
<option value="3">3 bags</option>
<option value="5">5 bags</option>
</select>

<button id="btn1" onclick="toggleCart('Sona Masuri Rice',60,'qty1','unit1','btn1')">
➕ Add
</button>

</div>
</div>

</div>
</section>

<!-- WHEAT -->
<section>
<h2>🌾 Wheat (గోధుమలు)</h2>
<div class="products">

<div class="card">
<img src="wheat.jpg">
<div class="card-content">
<h3>Wheat Grain (గోధుమలు) - ₹50/kg</h3>

<select id="qty2">
<option value="1">1 kg</option>
<option value="5" selected>5 kg</option>
<option value="10">10 kg</option>
<option value="50">50 kg</option>
</select>

<select id="unit2">
<option value="1">1 bag</option>
<option value="2">2 bags</option>
<option value="3">3 bags</option>
<option value="5">5 bags</option>
</select>

<button id="btn2" onclick="toggleCart('Wheat Grain',50,'qty2','unit2','btn2')">➕ Add</button>

</div>
</div>

</div>
</section>

<!-- MILLETS -->
<section>
<h2>🌱 Millets</h2>
<div class="products">

<div class="card">
<img src="foxtail.jpg">
<div class="card-content">
<h3>Foxtail (కొర్రలు) - ₹90/kg</h3>
<select id="qty3"><option value="1">1</option><option value="5" selected>5</option></select>
<select id="unit3"><option value="1">1</option><option value="2">2</option></select>
<button id="btn3" onclick="toggleCart('Foxtail',90,'qty3','unit3','btn3')">➕ Add</button>
</div>
</div>

<div class="card">
<img src="ragi.jpg">
<div class="card-content">
<h3>Ragi (రాగులు) - ₹70/kg</h3>
<select id="qty4"><option value="1">1</option><option value="5" selected>5</option></select>
<select id="unit4"><option value="1">1</option><option value="2">2</option></select>
<button id="btn4" onclick="toggleCart('Ragi',70,'qty4','unit4','btn4')">➕ Add</button>
</div>
</div>

</div>
</section>

<!-- CART -->
<section>
<h2>Cart 🛒</h2>
<div class="cart" id="cart">Cart is empty</div>
<p><b>Total: ₹<span id="total">0</span></b></p>

<input id="phone" placeholder="Phone (required)">
<button onclick="placeOrder()">Place Order</button>
</section>

<!-- CONFIRM -->
<section class="confirmation" id="confirmation">
<h2>✅ Order Placed!</h2>
<p id="orderInfo"></p>
<button onclick="location.reload()">New Order</button>
</section>

<script>
let cart=[];

function toggleCart(name,price,q,u,b){
 let qty=parseInt(document.getElementById(q).value);
 let unit=parseInt(document.getElementById(u).value);
 let btn=document.getElementById(b);

 let i=cart.findIndex(x=>x.name==name);

 if(i!=-1){
   cart.splice(i,1);
   btn.innerHTML="➕ Add";
   btn.classList.remove("added");
 }else{
   cart.push({name,price,qty,unit});
   btn.innerHTML="✅ Added";
   btn.classList.add("added");
 }

 render();
}

function render(){
 let total=0;
 let html="";

 cart.forEach((x,i)=>{
   let t=x.price*x.qty*x.unit;
   total+=t;

   html+=`
   <div class="cart-row">
     <span>${x.name} (${x.qty}kg × ${x.unit}) - ₹${t}</span>
     <button class="delete-btn" onclick="removeItem(${i})">❌</button>
   </div>`;
 });

 document.getElementById("cart").innerHTML=html||"Cart is empty";
 document.getElementById("total").innerText=total;
}

function removeItem(i){
 cart.splice(i,1);
 render();
}

function placeOrder(){
 let phone=document.getElementById("phone").value;
 if(!phone) return alert("Phone required");
 if(cart.length==0) return alert("Cart empty");

 let total=document.getElementById("total").innerText;

 document.getElementById("confirmation").style.display="block";
 document.getElementById("orderInfo").innerText="Amount ₹"+total;
}
</script>

</body>
</html>
