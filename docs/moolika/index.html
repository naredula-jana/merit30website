<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}

header{
background:#2e7d32;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
}

.hero{
background:#e8f5e9;
text-align:center;
padding:10px;
font-weight:bold;
color:#2e7d32;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
padding:8px;
border-radius:8px;
text-align:center;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:6px;
width:100%;
border-radius:5px;
margin-top:5px;
}

.cart{
background:white;
margin:10px;
padding:10px;
border-radius:8px;
}

.cart button{
width:auto;
margin:2px;
padding:4px 6px;
}
</style>
</head>

<body>

<header>
<div><b>🌿 MOOLIKA FOODS</b></div>
<div>📞 9XXXXXXXXX</div>
</header>

<div class="hero">
Healthy & Affordable Food
</div>

<div id="products" class="grid"></div>

<div class="cart">
<h3>Cart</h3>
<div id="cart">Empty</div>
<p>Total ₹<span id="total">0</span></p>
<input id="phone" placeholder="Phone">
<button onclick="placeOrder()">Place Order</button>
</div>

<script>

// PRODUCTS
var products = [
["Sona Masuri Rice",60],
["Raw Rice",55],
["Brown Rice",80],
["Wheat",50],
["Wheat Flour",55],
["Jowar",60],
["Jowar Flour",70],
["Foxtail Millet",90],
["Little Millet",95],
["Kodo Millet",100],
["Barnyard Millet",105],
["Proso Millet",90],
["Bajra",60],
["Ragi",70]
];

// CART
var cart = {};

// RENDER PRODUCTS
var container = document.getElementById("products");

for(var i=0;i<products.length;i++){

var card = document.createElement("div");
card.className="card";

var name = document.createElement("div");
name.innerHTML="<b>"+products[i][0]+"</b>";

var price = document.createElement("div");
price.innerHTML="₹"+products[i][1]+"/kg";

var btn = document.createElement("button");
btn.innerHTML="Add";
btn.setAttribute("onclick","addItem("+i+")");

card.appendChild(name);
card.appendChild(price);
card.appendChild(btn);

container.appendChild(card);
}

// ADD ITEM
function addItem(i){
var name = products[i][0];
var price = products[i][1];

if(cart[name]){
cart[name].qty += 1;
}else{
cart[name] = {price:price, qty:1};
}

renderCart();
}

// REMOVE
function removeItem(name){
delete cart[name];
renderCart();
}

// DECREASE
function decreaseItem(name){
cart[name].qty -= 1;
if(cart[name].qty <= 0){
delete cart[name];
}
renderCart();
}

// INCREASE
function addItemByName(name){
for(var i=0;i<products.length;i++){
if(products[i][0] === name){
addItem(i);
}
}
}

// RENDER CART
function renderCart(){

var html = "";
var total = 0;

for(var name in cart){

var item = cart[name];
var itemTotal = item.price * item.qty;
total += itemTotal;

html += "<div style='margin-bottom:8px;'>";

html += "<b>"+name+"</b><br>";
html += "₹"+item.price+" × "+item.qty+" = ₹"+itemTotal+"<br>";

html += "<button onclick=\"decreaseItem('"+name+"')\">➖</button>";
html += "<button onclick=\"addItemByName('"+name+"')\">➕</button>";
html += "<button onclick=\"removeItem('"+name+"')\">❌</button>";

html += "</div>";
}

document.getElementById("cart").innerHTML = html || "Empty";
document.getElementById("total").innerHTML = total;
}

// PLACE ORDER
function placeOrder(){

var phone = document.getElementById("phone").value;
if(!phone){
alert("Enter phone");
return;
}

var orderId = "ORD"+new Date().getTime();

// AGENT
var agentId="DIRECT";
var p=new URLSearchParams(window.location.search);
if(p.get("agent")) agentId=p.get("agent");

var url="https://script.google.com/macros/s/AKfycbyiSzKMSOQzxYceiq6_vUh5P82zF2OtATCi2DOAuUzOKxSvyII0pGeTrlSL2_JHP0I/exec"
+"?orderId="+orderId
+"&phone="+phone
+"&total="+document.getElementById("total").innerHTML
+"&agentId="+agentId;

var img=new Image();
img.src=url;

alert("Order placed: "+orderId);

cart={};
renderCart();
}

</script>

</body>
</html>
