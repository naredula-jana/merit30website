<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
padding-bottom:260px;
}

.header{
background:#004d40;
color:white;
padding:12px;
text-align:center;
font-size:18px;
}

.nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;
background:#e0f2f1;
padding:10px;
}

.nav button{
padding:6px 8px;
font-size:12px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.cart{
position:fixed;
bottom:0;
width:100%;
background:white;
padding:10px;
box-shadow:0 -2px 8px rgba(0,0,0,0.2);
font-size:13px;
}

button{
padding:5px;
background:#004d40;
color:white;
border:none;
border-radius:5px;
}

input,textarea{
width:100%;
padding:6px;
margin:3px 0;
border-radius:5px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="header">🌿 MOOLIKA FOODS</div>

<div class="nav">
<button onclick="showCategory('all')">All</button>
<button onclick="showCategory('grains')">Grains</button>
<button onclick="showCategory('millets')">Millets</button>
<button onclick="showCategory('oils')">Oils</button>
<button onclick="showCategory('misc')">Misc</button>
</div>

<div id="products"></div>

<div class="cart">

<div id="cart"></div>

<p>Total ₹<span id="total">0</span></p>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Place Order</button>

</div>

<script>

// PRODUCTS
var products=[
{ name:"Rice", price:60, category:"grains" },
{ name:"Wheat", price:50, category:"grains" },
{ name:"Toor Dal", price:120, category:"grains" },
{ name:"Ragi", price:70, category:"millets" },
{ name:"Groundnut Oil", price:180, category:"oils" },
{ name:"Jaggery", price:60, category:"misc" }
];

// CART FUNCTIONS
function getCart(){
return JSON.parse(localStorage.getItem("cart")||"{}");
}

function saveCart(c){
localStorage.setItem("cart",JSON.stringify(c));
renderCart();
}

function addItem(name,price){
var c=getCart();
c[name]=c[name]||{name:name,price:price,qty:0};
c[name].qty++;
saveCart(c);
}

function changeQty(k,d){
var c=getCart();
c[k].qty+=d;
if(c[k].qty<=0) delete c[k];
saveCart(c);
}

// MOBILE SAFE CART
function renderCart(){

var c=getCart(),h="",t=0;

for(var k in c){

var i=c[k];
var amt=i.price*i.qty;
t+=amt;

h+="<div style='border-bottom:1px solid #ddd;padding:6px 0;'>";

h+="<div style='font-weight:bold;word-break:break-word;'>"+i.name+"</div>";

h+="<div style='display:flex;justify-content:space-between;align-items:center;'>";

h+="<div>";
h+="<button onclick=\"changeQty('"+k+"',-1)\">-</button>";
h+=" "+i.qty+" ";
h+="<button onclick=\"changeQty('"+k+"',1)\">+</button>";
h+="</div>";

h+="<div>₹"+amt+"</div>";

h+="<div><button onclick=\"changeQty('"+k+"',-999)\">X</button></div>";

h+="</div></div>";
}

document.getElementById("cart").innerHTML=h||"Empty";
document.getElementById("total").innerHTML=t;
}

// PRODUCTS
function showCategory(cat){

var h="<div class='grid'>";

for(var i=0;i<products.length;i++){

var p=products[i];

if(cat==="all"||p.category===cat){

h+="<div class='card'>";
h+="<b>"+p.name+"</b><br>₹"+p.price+"<br>";
h+="<button onclick=\"addItem('"+p.name+"',"+p.price+")\">Add</button>";
h+="</div>";
}
}

h+="</div>";
document.getElementById("products").innerHTML=h;
}

// GOOGLE SHEET ORDER
function placeOrder(){

var name=document.getElementById("name").value;
var phone=document.getElementById("phone").value;
var address=document.getElementById("address").value;

if(!name||!phone||!address){
alert("Fill all details");
return;
}

var c=getCart(),text="",total=0;

for(var k in c){
var i=c[k];
var amt=i.price*i.qty;
total+=amt;
text+=i.name+" x "+i.qty+", ";
}

var orderId="ORD"+new Date().getTime();

var url="https://script.google.com/macros/s/AKfycbyiSzKMSOQzxYceiq6_vUh5P82zF2OtATCi2DOAuUzOKxSvyII0pGeTrlSL2_JHP0I/exec"
+"?orderId="+orderId
+"&name="+encodeURIComponent(name)
+"&phone="+phone
+"&address="+encodeURIComponent(address)
+"&cart="+encodeURIComponent(text)
+"&total="+total;

// instant response
alert("Order placed: "+orderId);

// background send
fetch(url).catch(()=>{});

// clear cart
localStorage.removeItem("cart");
renderCart();
}

// INIT
showCategory("all");
renderCart();

</script>

</body>
</html>
