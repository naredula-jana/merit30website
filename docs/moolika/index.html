<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods</title>

<style>
body{
  font-family:Arial;margin:0;background:#f5f5f5;
  padding-bottom:80px;
}

/* CLEAN HEADER */
.header{
  position:sticky;
  top:0;
  z-index:1000;
  background:#004d40;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:50px;
  font-weight:bold;
}

.menu-icon{
  position:absolute;
  left:12px;
  font-size:22px;
  cursor:pointer;
}

/* SIDE MENU */
.dropdown{
  position:fixed;
  top:0;
  left:-260px;
  width:220px;
  height:100%;
  background:white;
  box-shadow:2px 0 8px rgba(0,0,0,0.2);
  transition:0.3s;
  z-index:2000;
  padding-top:60px;
}

.dropdown a{
  display:block;
  padding:14px;
  text-decoration:none;
  color:#004d40;
  border-bottom:1px solid #eee;
}

.dropdown a:hover{
  background:#f5f5f5;
}

.hero{
  background:#e8f5e9;
  padding:12px;
  text-align:center;
  font-size:14px;
}

.section{padding:10px;}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:8px;
}

button{
  padding:6px;
  border:none;
  background:#004d40;
  color:white;
  border-radius:5px;
}

/* CART */
.cart{
  position:fixed;
  bottom:60px;
  width:100%;
  background:white;
  max-height:60vh;
  overflow:auto;
  box-shadow:0 -2px 8px rgba(0,0,0,0.2);
  display:none;
  padding:10px;
}

#miniCart{
  position:fixed;
  bottom:0;
  width:100%;
  background:#004d40;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

input,textarea{
  width:100%;padding:6px;margin:4px 0;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="menu-icon" onclick="toggleMenu()">☰</div>
  🌿 MOOLIKA FOODS
</div>

<!-- SIDE MENU -->
<div id="menu" class="dropdown">
  <a href="index.html">🏠 Home</a>
  <a href="#products">🛒 Products</a>
  <a href="about.html">ℹ️ About</a>
</div>

<!-- HERO -->
<div class="hero">
From Soil to Table — Naturally<br>
Connecting Farmers, Nature & Consumers through honest, natural food.
</div>

<!-- PRODUCTS -->
<div class="section" id="products">
<h3>Products</h3>
<div id="productsList" class="grid"></div>
</div>

<!-- CART -->
<div class="cart" id="cartBox">
<div id="cart"></div>
<p>Total ₹<span id="total">0</span></p>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">🛒 Order Fresh Now</button>
</div>

<!-- MINI CART -->
<div id="miniCart">
<span>🛒 ₹<span id="miniTotal">0</span></span>
<button onclick="toggleCart()">View Cart</button>
</div>

<script>

/* MENU */
function toggleMenu(){
  var m=document.getElementById("menu");
  m.style.left = (m.style.left==="0px") ? "-260px" : "0px";
}

/* PRODUCTS */
var products=[
{ name:"Rice", price:60, img:"rice.jpg" },
{ name:"Wheat", price:50, img:"wheat.jpg" },
{ name:"Ragi", price:70, img:"ragi.jpg" },
{ name:"Bajra", price:80, img:"bajra.jpg" },
{ name:"Foxtail", price:90, img:"foxtail.jpg" },
{ name:"Barnyard", price:95, img:"barnyard.jpg" }
];

function loadProducts(){
  var h="";
  products.forEach(p=>{
    h+=`<div class="card">
    <img src="${p.img}">
    <b>${p.name}</b><br>₹${p.price}/kg<br>
    <button onclick="addItem('${p.name}',${p.price})">Add</button>
    </div>`;
  });
  document.getElementById("productsList").innerHTML=h;
}

/* CART */
function getCart(){return JSON.parse(localStorage.getItem("cart")||"{}");}

function saveCart(c){
  localStorage.setItem("cart",JSON.stringify(c));
  renderCart();
}

function addItem(n,p){
  var c=getCart();
  c[n]=c[n]||{name:n,price:p,qty:0};
  c[n].qty++;
  saveCart(c);
}

function renderCart(){
  var c=getCart(),h="",t=0;

  for(var k in c){
    var i=c[k];
    var amt=i.price*i.qty;
    t+=amt;

    h+=`${i.name} ${i.qty} ₹${amt}<br>`;
  }

  document.getElementById("cart").innerHTML=h||"Empty";
  document.getElementById("total").innerHTML=t;
  document.getElementById("miniTotal").innerHTML=t;
}

function toggleCart(){
  var c=document.getElementById("cartBox");
  c.style.display = (c.style.display==="block")?"none":"block";
}

/* AGENT */
function getAgentId(){
  var p=new URLSearchParams(window.location.search);
  return p.get("agentId")||"DIRECT";
}

/* ORDER */
function placeOrder(){

  var name=document.getElementById("name").value;
  var phone=document.getElementById("phone").value;
  var address=document.getElementById("address").value;

  if(!name||!phone||!address){alert("Fill all details");return;}

  var c=getCart(),text="",total=0;

  for(var k in c){
    total+=c[k].price*c[k].qty;
    text+=k+" x "+c[k].qty+", ";
  }

  var url="https://script.google.com/macros/s/AKfycbyiSzKMSOQzxYceiq6_vUh5P82zF2OtATCi2DOAuUzOKxSvyII0pGeTrlSL2_JHP0I/exec"
  +"?agentId="+getAgentId()
  +"&name="+encodeURIComponent(name)
  +"&phone="+phone
  +"&address="+encodeURIComponent(address)
  +"&cart="+encodeURIComponent(text)
  +"&total="+total;

  fetch(url,{mode:"no-cors"});

  alert("Order placed");
  localStorage.removeItem("cart");
  renderCart();
}

loadProducts();
renderCart();

</script>

</body>
</html>
