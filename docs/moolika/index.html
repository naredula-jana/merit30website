<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}

header{
background:#2e7d32;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
}

section{padding:10px;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
}

.card{
background:white;
border-radius:8px;
padding:8px;
text-align:center;
position:relative;
}

.card img{
width:100%;
height:90px;
object-fit:cover;
}

.desc{
font-size:12px;
color:#555;
margin:5px 0;
}

.badge{
background:#ff9800;
color:white;
font-size:10px;
padding:3px 6px;
border-radius:6px;
position:absolute;
top:5px;
left:5px;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:8px;
border-radius:6px;
width:100%;
}

.added{background:#4caf50;}

select,input,textarea{
width:100%;
padding:6px;
margin:4px 0;
}

/* CART */
.cart{
background:white;
padding:10px;
border-radius:8px;
}

.cart-row{
display:flex;
justify-content:space-between;
align-items:center;
font-size:13px;
margin:4px 0;
}

/* SMALL DELETE BUTTON */
.del{
background:red;
color:white;
border:none;
border-radius:50%;
width:22px;
height:22px;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
padding:0;
}

</style>
</head>

<body>

<header>
<div>
<b>🌿 MOOLIKA FOODS</b><br>
<small>From Soil to Table</small>
</div>
<div>📞 9XXXXXXXXX</div>
</header>

<section>
<h3>Products</h3>

<div class="products" id="products"></div>
</section>

<section>
<h3>Cart 🛒</h3>
<div class="cart" id="cart">Cart is empty</div>
<p>Total ₹<span id="total">0</span></p>

<h3>Customer Details</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone (required)">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Place Order</button>
</section>

<script>
let cart=[];

let products=[
{name:"Sona Masuri Rice",telugu:"సోనా మసూరి",price:60,img:"rice.jpg",desc:"Light weight daily rice",special:true},
{name:"Wheat",telugu:"గోధుమలు",price:50,img:"wheat.jpg",desc:"High fiber grain",special:false},
{name:"Wheat Flour",telugu:"గోధుమ పిండి",price:55,img:"wheat-flour.jpg",desc:"Soft atta flour",special:true},
{name:"Jowar",telugu:"జొన్నలు",price:60,img:"jowar.jpg",desc:"Gluten free grain",special:false},
{name:"Jowar Flour",telugu:"జొన్న పిండి",price:70,img:"jowar-flour.jpg",desc:"Healthy flour",special:true},
{name:"Foxtail",telugu:"కొర్రలు",price:90,img:"foxtail.jpg",desc:"Low GI millet",special:true},
{name:"Little",telugu:"సామలు",price:95,img:"little.jpg",desc:"Iron rich millet",special:false},
{name:"Kodo",telugu:"ఆరికెలు",price:100,img:"kodo.jpg",desc:"High fiber millet",special:false},
{name:"Barnyard",telugu:"ఉదలు",price:105,img:"barnyard.jpg",desc:"Fast cooking millet",special:false},
{name:"Proso",telugu:"వరగులు",price:90,img:"proso.jpg",desc:"Protein rich",special:false},
{name:"Bajra",telugu:"సజ్జలు",price:60,img:"bajra.jpg",desc:"Good for heart",special:true},
{name:"Ragi",telugu:"రాగులు",price:70,img:"ragi.jpg",desc:"High calcium grain",special:true}
];

let container=document.getElementById("products");

products.forEach((p,i)=>{
container.innerHTML+=`
<div class="card">
${p.special?'<div class="badge">⭐ Special</div>':''}
<img src="${p.img}">
<h4>${p.name} (${p.telugu}) - ₹${p.price}/kg</h4>
<p class="desc">${p.desc}</p>

<select id="q${i}">
<option>1</option>
<option selected>5</option>
<option>10</option>
</select>

<select id="u${i}">
<option>1 bag</option>
<option>2 bags</option>
<option>3 bags</option>
</select>

<button id="b${i}" onclick="toggle(${i},'${p.name}',${p.price})">Add</button>
</div>
`;
});

function toggle(i,name,price){
let q=parseInt(document.getElementById("q"+i).value);
let u=parseInt(document.getElementById("u"+i).value);
let b=document.getElementById("b"+i);

let idx=cart.findIndex(x=>x.name==name);

if(idx!=-1){
cart.splice(idx,1);
b.innerText="Add";
b.classList.remove("added");
}else{
cart.push({name,price,q,u});
b.innerText="Added";
b.classList.add("added");
}

render();
}

function render(){
let html="";
let total=0;

cart.forEach((x,i)=>{
let t=x.price*x.q*x.u;
total+=t;

html+=`
<div class="cart-row">
<span>${x.name} (${x.q}kg × ${x.u}) ₹${t}</span>
<button class="del" onclick="removeItem(${i})">✕</button>
</div>`;
});

document.getElementById("cart").innerHTML=html||"Cart is empty";
document.getElementById("total").innerText=total;
}

function removeItem(i){
cart.splice(i,1);
render();
}

function placeOrder(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

if(!phone) return alert("Phone required");
if(cart.length==0) return alert("Cart empty");

let orderId="ORD"+Date.now();
let total=document.getElementById("total").innerText;

alert("✅ Order Placed!\nOrder ID: "+orderId+"\nAmount ₹"+total);

cart=[];
render();
}
</script>

</body>
</html>
