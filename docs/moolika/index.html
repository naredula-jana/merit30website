<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
header{
background:#2e7d32;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
}
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}
.card{
background:white;
padding:8px;
border-radius:8px;
text-align:center;
}
button{
background:#2e7d32;
color:white;
border:none;
padding:6px;
width:100%;
border-radius:5px;
}
.cart{
background:white;
margin:10px;
padding:10px;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<div><b>🌿 MOOLIKA FOODS</b></div>
<div>📞 9XXXXXXXXX</div>
</header>

<div id="products" class="grid"></div>

<div class="cart">
<h3>Cart</h3>
<div id="cart">Empty</div>
<p>Total ₹<span id="total">0</span></p>
<input id="phone" placeholder="Phone">
<button onclick="placeOrder()">Place Order</button>
</div>

<script>

// PRODUCTS (SAFE)
var products = [
["Rice",60],
["Wheat",50],
["Ragi",70],
["Jowar",60],
["Foxtail",90],
["Bajra",60]
];

var cart = [];

// RENDER PRODUCTS
var container = document.getElementById("products");

for(var i=0;i<products.length;i++){

var card = document.createElement("div");
card.className="card";

var title = document.createElement("div");
title.innerHTML="<b>"+products[i][0]+"</b>";

var price = document.createElement("div");
price.innerHTML="₹"+products[i][1];

var btn = document.createElement("button");
btn.innerHTML="Add";

btn.onclick = (function(index){
return function(){
addItem(index);
};
})(i);

card.appendChild(title);
card.appendChild(price);
card.appendChild(btn);

container.appendChild(card);
}

// ADD ITEM
function addItem(i){
cart.push(products[i]);
renderCart();
}

// RENDER CART
function renderCart(){
var html="";
var total=0;

for(var i=0;i<cart.length;i++){
html += cart[i][0]+" ₹"+cart[i][1]+"<br>";
total += cart[i][1];
}

document.getElementById("cart").innerHTML = html || "Empty";
document.getElementById("total").innerHTML = total;
}

// ORDER
function placeOrder(){

var phone = document.getElementById("phone").value;
if(!phone){
alert("Enter phone");
return;
}

var orderId = "ORD"+new Date().getTime();

// agent
var agentId="DIRECT";
var p=new URLSearchParams(window.location.search);
if(p.get("agent")) agentId=p.get("agent");

var url="https://script.google.com/macros/s/AKfycbyiSzKMSOQzxYceiq6_vUh5P82zF2OtATCi2DOAuUzOKxSvyII0pGeTrlSL2_JHP0I/exec"
+"?orderId="+orderId
+"&phone="+phone
+"&total="+document.getElementById("total").innerHTML
+"&agentId="+agentId;

var img=new Image();
img.src=url;

alert("Order placed "+orderId);

cart=[];
renderCart();
}

</script>

</body>
</html>
