<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;padding-bottom:200px;}

.header{background:#004d40;color:white;padding:12px;text-align:center;}
.nav{display:flex;justify-content:center;gap:10px;background:#e0f2f1;padding:10px;}
.nav button{padding:6px 10px;border:none;background:#004d40;color:white;border-radius:5px;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px;}
.card{background:white;padding:10px;border-radius:10px;text-align:center;}

.cart{position:fixed;bottom:0;width:100%;background:white;padding:10px;box-shadow:0 -2px 8px rgba(0,0,0,0.2);}

button{padding:5px;border:none;background:#004d40;color:white;border-radius:5px;}
</style>
</head>

<body>

<div class="header">🌿 MOOLIKA FOODS</div>

<div class="nav">
<button onclick="showCategory('all')">All</button>
<button onclick="showCategory('grains')">Grains</button>
<button onclick="showCategory('millets')">Millets</button>
<button onclick="showCategory('oils')">Oils</button>
<button onclick="showCategory('misc')">Misc</button>
</div>

<div id="products"></div>

<div class="cart">
<div id="cart"></div>
<p>Total ₹<span id="total">0</span></p>
<button onclick="placeOrder()">Place Order</button>
</div>

<script>

// PRODUCTS
var products=[
{ name:"Rice", price:60, category:"grains", sizes:[5,20] },
{ name:"Wheat", price:50, category:"grains", sizes:[5,10] },
{ name:"Toor Dal", price:120, category:"grains", sizes:[1,5] },
{ name:"Ragi", price:70, category:"millets", sizes:[5] },
{ name:"Groundnut Oil", price:180, category:"oils", sizes:[1] },
{ name:"Jaggery", price:60, category:"misc", sizes:[1] }
];

// CART
function getCart(){return JSON.parse(localStorage.getItem("cart")||"{}");}
function saveCart(c){localStorage.setItem("cart",JSON.stringify(c));renderCart();}

function addItem(name,price){
var c=getCart();
var key=name;
c[key]=c[key]||{name,price,qty:0};
c[key].qty++;
saveCart(c);
}

function changeQty(k,d){
var c=getCart();
c[k].qty+=d;
if(c[k].qty<=0) delete c[k];
saveCart(c);
}

function renderCart(){
var c=getCart(),h="",t=0;

for(var k in c){
var i=c[k];
var amt=i.price*i.qty;
t+=amt;

h+=i.name+" ";
h+="<button onclick=\"changeQty('"+k+"',-1)\">-</button>";
h+=i.qty;
h+="<button onclick=\"changeQty('"+k+"',1)\">+</button>";
h+=" ₹"+amt+" ";
h+="<button onclick=\"changeQty('"+k+"',-999)\">X</button><br>";
}

document.getElementById("cart").innerHTML=h||"Empty";
document.getElementById("total").innerHTML=t;
}

// PRODUCTS RENDER
function showCategory(cat){
var h="<div class='grid'>";

for(var i=0;i<products.length;i++){
var p=products[i];

if(cat==="all" || p.category===cat){
h+="<div class='card'>";
h+="<b>"+p.name+"</b><br>₹"+p.price+"<br>";
h+="<button onclick=\"addItem('"+p.name+"',"+p.price+")\">Add</button>";
h+="</div>";
}
}

h+="</div>";
document.getElementById("products").innerHTML=h;
}

// ORDER
function placeOrder(){
alert("Order placed");
localStorage.removeItem("cart");
renderCart();
}

// INIT
showCategory("all");
renderCart();

</script>

</body>
</html>
