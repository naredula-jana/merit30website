<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moolika Foods</title>

<style>
body { font-family: Arial; margin: 0; background: #f7f7f7; }

header {
    background:#2e7d32;
    color:white;
    padding:10px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

section { padding:15px; max-width:1000px; margin:auto; }

.products {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap:12px;
}

.card {
    background:white;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img {
    width:100%;
    height:100px;
    object-fit:cover;
}

.card-content {
    padding:10px;
    text-align:center;
}

.card-content h3 {
    font-size:14px;
    margin-bottom:8px;
}

/* BUTTON */
button {
    background:#2e7d32;
    color:white;
    padding:10px;
    border:none;
    border-radius:8px;
    width:100%;
    font-size:14px;
    transition: all 0.2s ease;
}

button:active {
    transform: scale(0.95);
}

.added {
    background:#4caf50 !important;
}

/* INPUT */
select, input, textarea {
    width:100%;
    padding:8px;
    margin:5px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

.cart {
    background:white;
    padding:10px;
    border-radius:10px;
}

.confirmation {
    display:none;
    text-align:center;
    padding:40px;
}
</style>
</head>

<body>

<header>
<div>
<b>🌿 MOOLIKA FOODS</b><br>
<small>From Soil to Table</small>
</div>
<div>📞 9XXXXXXXXX</div>
</header>

<!-- PRODUCT TEMPLATE EXAMPLE -->
<section>
<h2>🌾 Rice (బియ్యం)</h2>
<div class="products">

<div class="card">
<img src="rice.jpg">
<div class="card-content">
<h3>Sona Masuri (సోనా మసూరి) - ₹60/kg</h3>

<select id="qty1">
<option value="1">1 kg</option>
<option value="5" selected>5 kg</option>
<option value="10">10 kg</option>
<option value="50">50 kg</option>
</select>

<select id="unit1">
<option value="1">1 bag</option>
<option value="2">2 bags</option>
<option value="3">3 bags</option>
<option value="5">5 bags</option>
</select>

<button id="btn1" onclick="toggleCart('Sona Masuri Rice',60,'qty1','unit1','btn1')">
➕ Add
</button>

</div>
</div>

</div>
</section>

<!-- CART -->
<section id="orderSection">
<h2>Cart 🛒</h2>
<div class="cart" id="cart">Cart is empty</div>
<p><b>Total: ₹<span id="total">0</span></b></p>

<h3>Customer Details</h3>
<input type="text" id="name" placeholder="Name">
<input type="tel" id="phone" placeholder="Phone (Required)">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Place Order (COD)</button>
</section>

<!-- CONFIRM -->
<section class="confirmation" id="confirmation">
<h2>✅ Order Placed!</h2>
<p id="orderInfo"></p>
<p>💵 Cash on Delivery</p>
<button onclick="location.reload()">New Order</button>
</section>

<script>
let cart = [];

function toggleCart(name, price, qtyId, unitId, btnId) {

    const qty = parseInt(document.getElementById(qtyId).value);
    const units = parseInt(document.getElementById(unitId).value);
    const btn = document.getElementById(btnId);

    const index = cart.findIndex(item => item.name === name);

    if (index !== -1) {
        cart.splice(index, 1);
        btn.innerHTML = "➕ Add";
        btn.classList.remove("added");
    } else {
        cart.push({name, price, qty, units});
        btn.innerHTML = "✅ Added";
        btn.classList.add("added");
    }

    renderCart();
}

function renderCart() {

    const cartDiv = document.getElementById('cart');

    if(cart.length === 0){
        cartDiv.innerHTML = "Cart is empty";
        document.getElementById('total').innerText = 0;
        return;
    }

    let total = 0;
    cartDiv.innerHTML = "";

    cart.forEach((item, index) => {

        const itemTotal = item.price * item.qty * item.units;
        total += itemTotal;

        cartDiv.innerHTML += `
        ${item.name} (${item.qty}kg × ${item.units}) = ₹${itemTotal}
        <button onclick="removeItem(${index})">❌</button><br>`;
    });

    document.getElementById('total').innerText = total;
}

function removeItem(index) {
    cart.splice(index, 1);
    renderCart();
}

function placeOrder() {
    const phone = document.getElementById('phone').value;
    if (!phone) return alert("Phone is mandatory");
    if (cart.length === 0) return alert("Cart is empty");

    const orderId = "ORD" + Date.now();
    const total = document.getElementById('total').innerText;

    document.getElementById("orderSection").style.display = "none";
    document.getElementById("confirmation").style.display = "block";

    document.getElementById("orderInfo").innerText =
        `Order ID: ${orderId} | Amount: ₹${total}`;
}
</script>

</body>
</html>
