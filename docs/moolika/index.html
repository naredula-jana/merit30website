<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moolika Food</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, Arial;
    margin: 0;
    background: #f7f7f7;
}

header {
    background:#2e7d32;
    color:white;
    text-align:center;
    padding:15px;
}

header h1 {
    margin:0;
}

section {
    padding:20px;
    max-width:1000px;
    margin:auto;
}

.hero img {
    width:100%;
    border-radius:10px;
}

.products {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap:15px;
}

.card {
    background:white;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    overflow:hidden;
}

.card img {
    width:100%;
    height:150px;
    object-fit:cover;
}

.card-content {
    padding:15px;
    text-align:center;
}

button {
    background:#2e7d32;
    color:white;
    padding:10px;
    border:none;
    border-radius:8px;
    width:100%;
    margin-top:10px;
    font-size:16px;
}

button:hover {
    background:#1b5e20;
}

.cart {
    background:white;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}

.cart-item {
    margin:8px 0;
    border-bottom:1px solid #eee;
    padding-bottom:5px;
}

.total {
    font-size:18px;
    font-weight:bold;
    margin-top:10px;
}

input, textarea {
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

#statusMsg {
    margin-top:10px;
    font-size:16px;
}

footer {
    background:#2e7d32;
    color:white;
    text-align:center;
    padding:12px;
    margin-top:20px;
}

/* Mobile */
@media (max-width:600px) {
    header h1 { font-size:20px; }
    button { font-size:18px; }
}
</style>
</head>

<body>

<header>
<h1>🌿 MOOLIKA</h1>
<p>From Soil to Table</p>
</header>

<section class="hero">
<img src="moolika-banner.png">
</section>

<section>
<h2>Products</h2>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1586201375761-83865001e31c">
<div class="card-content">
<h3>Sona Masuri Rice</h3>
<p>₹60/kg</p>
<input type="number" id="qty1" placeholder="Qty (kg)">
<button onclick="addToCart('Sona Masuri Rice',60,'qty1')">Add</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1601493700631-2b16ec4b4716">
<div class="card-content">
<h3>Brown Rice</h3>
<p>₹80/kg</p>
<input type="number" id="qty2" placeholder="Qty (kg)">
<button onclick="addToCart('Brown Rice',80,'qty2')">Add</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1622484212850-eb596d769edc">
<div class="card-content">
<h3>Jowar Flour</h3>
<p>₹70/kg</p>
<input type="number" id="qty3" placeholder="Qty (kg)">
<button onclick="addToCart('Jowar Flour',70,'qty3')">Add</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1592928302636-c83cf1e1c887">
<div class="card-content">
<h3>Foxtail Millet</h3>
<p>₹90/kg</p>
<input type="number" id="qty4" placeholder="Qty (kg)">
<button onclick="addToCart('Foxtail Millet',90,'qty4')">Add</button>
</div>
</div>

</div>
</section>

<section>
<h2>Cart 🛒</h2>

<div class="cart" id="cart"></div>

<p class="total">Total: ₹<span id="total">0</span></p>

<h3>Customer Details</h3>

<input type="text" id="name" placeholder="Name" required>
<input type="tel" id="phone" placeholder="Phone" required>
<textarea id="address" placeholder="Address" required></textarea>

<p id="statusMsg"></p>

<button onclick="placeOrder()">Place Order</button>

</section>

<footer>
<p>© 2026 Moolika Food</p>
</footer>

<script>
let cart = [];

function addToCart(name, price, qtyId) {
    const qty = document.getElementById(qtyId).value;

    if (!qty || qty <= 0) {
        alert("Enter quantity");
        return;
    }

    cart.push({name, price, qty});
    renderCart();
}

function renderCart() {
    const cartDiv = document.getElementById('cart');
    cartDiv.innerHTML = "";
    let total = 0;

    cart.forEach((item, index) => {
        total += item.price * item.qty;

        cartDiv.innerHTML += `
        <div class="cart-item">
            <b>${item.name}</b><br>
            ${item.qty} kg × ₹${item.price} = ₹${item.price * item.qty}
            <br>
            <button onclick="removeItem(${index})">Remove</button>
        </div>`;
    });

    document.getElementById('total').innerText = total;
}

function removeItem(index) {
    cart.splice(index, 1);
    renderCart();
}

function placeOrder() {

    const name = document.getElementById('name').value;
    const phone = document.getElementById('phone').value;
    const address = document.getElementById('address').value;
    const statusMsg = document.getElementById('statusMsg');

    if (cart.length === 0) {
        statusMsg.innerText = "❌ Cart is empty";
        statusMsg.style.color = "red";
        return;
    }

    statusMsg.innerText = "⏳ Placing order...";
    statusMsg.style.color = "blue";

    const total = document.getElementById('total').innerText;

    fetch("https://script.google.com/macros/s/AKfycbxeXUF1CpHXzstZIdx_cV3cT1WLUtYhBWedCYHCP-OFp8hYDH--sk2PMTtfxF5obmR5qQ/exec", {
        method: "POST",
        body: JSON.stringify({name, phone, address, cart, total})
    })
    .then(res => res.text())
    .then(() => {
        statusMsg.innerText = "✅ Order placed successfully!";
        statusMsg.style.color = "green";

        cart = [];
        renderCart();

        document.getElementById('name').value = "";
        document.getElementById('phone').value = "";
        document.getElementById('address').value = "";
    })
    .catch(() => {
        statusMsg.innerText = "❌ Failed to save order. Try again.";
        statusMsg.style.color = "red";
    });
}
</script>

</body>
</html>
