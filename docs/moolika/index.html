<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods v46</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}

header{background:#004d40;color:white;padding:12px;display:flex;justify-content:space-between;}
.nav{display:flex;gap:10px;padding:10px;background:#e0f2f1;justify-content:center;}
.nav a{text-decoration:none;color:#004d40;font-weight:bold;}

.hero{background:#c8e6c9;text-align:center;padding:10px;font-weight:bold;}

.tiles{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.tile{
background:white;
padding:20px;
text-align:center;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.best{
padding:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
position:relative;
}

.badge{
position:absolute;
top:5px;
left:5px;
background:orange;
color:white;
font-size:10px;
padding:3px;
border-radius:5px;
}

.price{font-weight:bold;color:#004d40;}

.cart{background:white;margin:10px;padding:10px;border-radius:10px;}

</style>
</head>

<body>

<header>
<div>🌿 MOOLIKA FOODS</div>
<div>📞 99999-00046</div>
</header>

<div class="nav">
<a href="index.html">Home</a>
<a href="grains.html">Grains</a>
</div>

<div class="hero">
Healthy • Affordable • Diabetic Friendly
</div>

<!-- CATEGORY TILES -->
<div class="tiles">
<div class="tile" onclick="location.href='grains.html'">🌾 Grains & Pulses</div>
<div class="tile" onclick="location.href='millets.html'">🌿 Millets</div>
<div class="tile" onclick="location.href='oils.html'">🛢 Oils</div>
<div class="tile" onclick="location.href='misc.html'">🍯 Misc</div>
</div>

<!-- BEST SELLERS -->
<div class="best">
<h3>⭐ Best Sellers</h3>
<div id="best"></div>
</div>

<div class="cart">
<h3>Cart 🛒</h3>
<div id="cart"></div>
<p>Total ₹<span id="total">0</span></p>
</div>

<script src="products.js"></script>

<script>

var cart = JSON.parse(localStorage.getItem("cart") || {});

// BEST SELLERS
function renderBest(){

var html="<div class='grid'>";

var items = allProducts.filter(p=>p.bestseller);

for(var p of items){

html+=`
<div class="card">
<div class="badge">BEST</div>
<b>${p.name}</b>
<div class="price">₹${p.price}</div>
</div>`;
}

html+="</div>";

document.getElementById("best").innerHTML=html;
}

// CART
function renderCart(){

var html="",total=0;

for(var k in cart){
var i=cart[k];
var t=i.price*i.size*i.qty;
total+=t;

html+=`${i.name} (${i.size}kg)x${i.qty} = ₹${t}<br>`;
}

document.getElementById("cart").innerHTML=html||"Empty";
document.getElementById("total").innerHTML=total;
}

renderBest();
renderCart();

</script>

</body>
</html>
