]
},

{
category:"🌱 Millets",
items:[
{name:"Foxtail",telugu:"కొర్రలు",price:90,img:"foxtail.jpg",desc:"Diabetes friendly millet",special:true,organic:true,healthy:true,stock:true},
{name:"Little",telugu:"సామలు",price:95,img:"little.jpg",desc:"Iron rich",organic:true,healthy:true,stock:true},
{name:"Kodo",telugu:"ఆరికెలు",price:100,img:"kodo.jpg",desc:"High fiber",organic:true,healthy:true,stock:true},
{name:"Barnyard",telugu:"ఉదలు",price:105,img:"barnyard.jpg",desc:"Fast cooking",organic:true,healthy:true,stock:true},
{name:"Proso",telugu:"వరగులు",price:90,img:"proso.jpg",desc:"Protein rich",organic:true,healthy:true,stock:true},
{name:"Bajra",telugu:"సజ్జలు",price:60,img:"bajra.jpg",desc:"Energy rich",organic:true,healthy:true,stock:true},
{name:"Ragi",telugu:"రాగులు",price:70,img:"ragi.jpg",desc:"High calcium",special:true,organic:true,healthy:true,stock:true}
]
}

];

let container=document.getElementById("products");

productsByCategory.forEach((cat,ci)=>{

container.innerHTML += `<h3>${cat.category}</h3><div class="products">`;

cat.items.forEach((p,i)=>{

let id = ci + "_" + i;

container.innerHTML += `
<div class="card ${!p.stock?'out':''}">

${p.special?'<div class="badge">🔥 Best Value</div>':''}
${p.discount?`<div class="discount">${p.discount}% OFF</div>`:''}
${p.organic?'<div class="organic">🌿 Organic</div>':''}
${p.healthy?'<div class="healthy">💚 Healthy</div>':''}

<img src="${p.img}">

<h4>
${p.name} (${p.telugu})<br>
${p.oldPrice?`<span class="old">₹${p.oldPrice}</span>`:''}
<span class="price">₹${p.price}/kg</span>
</h4>

${p.oldPrice?`<div class="save">Save ₹${p.oldPrice-p.price}</div>`:''}

<p class="desc">${p.desc}</p>

<select id="q${id}">
<option>1</option><option selected>5</option><option>10</option>
</select>

<select id="u${id}">
<option>1 bag</option><option>2</option><option>3</option>
</select>

<button id="b${id}" onclick="toggleCat('${id}','${p.name}',${p.price})">
Add
</button>

</div>
`;

});

container.innerHTML += `</div>`;
});

// NEW toggle for category ids
function toggleCat(id,name,price){
let q=parseInt(document.getElementById("q"+id).value);
let u=parseInt(document.getElementById("u"+id).value);
let b=document.getElementById("b"+id);

let idx=cart.findIndex(x=>x.name==name);

if(idx!=-1){
cart.splice(idx,1);
b.innerText="Add";
b.classList.remove("added");
}else{
cart.push({name,price,q,u});
b.innerText="Added";
b.classList.add("added");
}

render();
}

</script>
