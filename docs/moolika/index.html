<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;padding-bottom:80px;}

.header{
  position:sticky;top:0;z-index:1000;
  background:#004d40;color:white;
  display:flex;align-items:center;height:40px;
  font-size:13px;
}

.menu-icon{position:absolute;left:10px;font-size:20px;cursor:pointer;}

.title{
  width:100%;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.dropdown{
  position:fixed;top:0;left:-260px;width:220px;height:100%;
  background:white;box-shadow:2px 0 8px rgba(0,0,0,0.2);
  transition:0.3s;z-index:2000;padding-top:50px;
}

.dropdown a{
  display:block;padding:14px;text-decoration:none;
  color:#004d40;border-bottom:1px solid #eee;
}

.section{padding:10px;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.card{
  background:white;padding:10px;border-radius:10px;text-align:center;
}

.card img{width:100%;height:90px;object-fit:cover;border-radius:8px;}

button{
  padding:6px;background:#004d40;color:white;border:none;border-radius:5px;
}

/* CART */
.cart{
  position:fixed;bottom:60px;width:100%;background:white;
  max-height:60vh;overflow:auto;display:none;padding:10px;
}

#miniCart{
  position:fixed;bottom:0;width:100%;
  background:#004d40;color:white;padding:10px;
  display:flex;justify-content:space-between;
}
</style>
</head>

<body>

<div class="header">
  <div class="menu-icon" onclick="toggleMenu()">☰</div>
  <div class="title">🌿 Moolika Foods — From Soil to Table</div>
</div>

<div id="menu" class="dropdown">
  <a href="index.html">🏠 Home</a>
  <a href="products.html">🛒 Products</a>
  <a href="about.html">ℹ️ About</a>
</div>

<div class="section">
<h3>Products</h3>
<div id="productsList" class="grid"></div>
</div>

<div class="cart" id="cartBox">
<div id="cart"></div>
<p>Total ₹<span id="total">0</span></p>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Order</button>
</div>

<div id="miniCart">
<span>🛒 ₹<span id="miniTotal">0</span></span>
<button onclick="toggleCart()">Cart</button>
</div>

<script>

function toggleMenu(){
  var m=document.getElementById("menu");
  m.style.left=(m.style.left==="0px")?"-260px":"0px";
}

/* PRODUCTS */
var products=[
{ name:"Rice", price:60, img:"rice.jpg" },
{ name:"Wheat", price:50, img:"wheat.jpg" },
{ name:"Ragi", price:70, img:"ragi.jpg" },
{ name:"Bajra", price:80, img:"bajra.jpg" }
];

function loadProducts(){
  var h="";
  products.forEach(p=>{
    h+=`<div class="card">
    <img src="${p.img}">
    <b>${p.name}</b><br>₹${p.price}<br>
    <button onclick="addItem('${p.name}',${p.price})">Add</button>
    </div>`;
  });
  document.getElementById("productsList").innerHTML=h;
}

/* CART (SHARED) */
function getCart(){return JSON.parse(localStorage.getItem("cart")||"{}");}
function saveCart(c){localStorage.setItem("cart",JSON.stringify(c));renderCart();}

function addItem(n,p){
  var c=getCart();
  c[n]=c[n]||{name:n,price:p,qty:0};
  c[n].qty++;
  saveCart(c);
}

function renderCart(){
  var c=getCart(),t=0,h="";
  for(var k in c){
    var i=c[k];
    var amt=i.price*i.qty;
    t+=amt;
    h+=`${i.name} ${i.qty} ₹${amt}<br>`;
  }
  document.getElementById("cart").innerHTML=h||"Empty";
  document.getElementById("total").innerHTML=t;
  document.getElementById("miniTotal").innerHTML=t;
}

function toggleCart(){
  var c=document.getElementById("cartBox");
  c.style.display=(c.style.display==="block")?"none":"block";
}

function placeOrder(){
  alert("Order placed");
  localStorage.removeItem("cart");
  renderCart();
}

loadProducts();
renderCart();

</script>

</body>
</html>
