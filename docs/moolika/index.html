<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}

header{
background:#2e7d32;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
}

section{padding:10px;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
}

.card{
background:white;
border-radius:8px;
padding:8px;
text-align:center;
}

.card img{
width:100%;
height:90px;
object-fit:cover;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:8px;
border-radius:6px;
width:100%;
}

.added{background:#4caf50;}

.cart-row{
display:flex;
justify-content:space-between;
font-size:13px;
margin:4px 0;
}

.del{
background:red;
color:white;
border:none;
border-radius:4px;
padding:2px 6px;
}

</style>
</head>

<body>

<header>
<div>
<b>🌿 MOOLIKA FOODS</b><br>
<small>From Soil to Table</small>
</div>
<div>📞 9XXXXXXXXX</div>
</header>

<!-- PRODUCTS -->
<section>
<h3>Products</h3>

<div class="products">

<!-- TEMPLATE -->
<script>
let items=[
["Rice",60,"rice.jpg"],
["Wheat",50,"wheat.jpg"],
["Wheat Flour",55,"wheat-flour.jpg"],
["Jowar",60,"jowar.jpg"],
["Jowar Flour",70,"jowar-flour.jpg"],
["Foxtail",90,"foxtail.jpg"],
["Little",95,"little.jpg"],
["Kodo",100,"kodo.jpg"],
["Barnyard",105,"barnyard.jpg"],
["Proso",90,"proso.jpg"],
["Bajra",60,"bajra.jpg"],
["Ragi",70,"ragi.jpg"]
];

items.forEach((x,i)=>{
document.write(`
<div class="card">
<img src="${x[2]}">
<h4>${x[0]} - ₹${x[1]}/kg</h4>

<select id="q${i}">
<option>1</option>
<option selected>5</option>
<option>10</option>
</select>

<select id="u${i}">
<option>1</option>
<option>2</option>
<option>3</option>
</select>

<button id="b${i}" onclick="toggle(${i},'${x[0]}',${x[1]})">Add</button>
</div>
`);
});
</script>

</div>
</section>

<!-- CART -->
<section>
<h3>Cart</h3>
<div id="cart">Empty</div>
<p>Total ₹<span id="t">0</span></p>

<input id="ph" placeholder="Phone required">
<button onclick="order()">Order</button>
</section>

<script>
let cart=[];

function toggle(i,name,price){
let q=parseInt(document.getElementById("q"+i).value);
let u=parseInt(document.getElementById("u"+i).value);
let b=document.getElementById("b"+i);

let idx=cart.findIndex(x=>x.name==name);

if(idx!=-1){
cart.splice(idx,1);
b.innerText="Add";
b.classList.remove("added");
}else{
cart.push({name,price,q,u});
b.innerText="Added";
b.classList.add("added");
}

render();
}

function render(){
let html="";
let total=0;

cart.forEach((x,i)=>{
let v=x.price*x.q*x.u;
total+=v;

html+=`
<div class="cart-row">
<span>${x.name} (${x.q}kg x ${x.u}) ₹${v}</span>
<button class="del" onclick="rem(${i})">x</button>
</div>`;
});

document.getElementById("cart").innerHTML=html||"Empty";
document.getElementById("t").innerText=total;
}

function rem(i){
cart.splice(i,1);
render();
}

function order(){
if(!document.getElementById("ph").value) return alert("Phone required");
if(cart.length==0) return alert("Cart empty");
alert("Order placed");
}
</script>

</body>
</html>
