<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}

header{
background:#2e7d32;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
font-size:14px;
}

section{padding:10px;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

.card{
background:white;
border-radius:8px;
padding:8px;
text-align:center;
}

.card img{
width:100%;
height:80px;
object-fit:cover;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:8px;
border-radius:6px;
width:100%;
font-size:13px;
}

.added{background:#4caf50;}

select,input,textarea{
width:100%;
padding:6px;
margin:4px 0;
font-size:13px;
}

.cart{
background:white;
padding:8px;
border-radius:8px;
}

.cart-row{
display:flex;
justify-content:space-between;
font-size:12px;
margin:4px 0;
}

.del{
background:red;
color:white;
border:none;
border-radius:4px;
padding:2px 5px;
}

@media (max-width:600px){
header{font-size:12px;}
.card img{height:70px;}
}
</style>
</head>

<body>

<header>
<div>
<b>🌿 MOOLIKA FOODS</b><br>
<small>From Soil to Table</small>
</div>
<div>📞 9XXXXXXXXX</div>
</header>

<section>
<h3>Products</h3>

<div class="products">

<!-- PRODUCTS (same structure) -->

<script>
let items=[
["Rice",60,"rice.jpg"],
["Wheat",50,"wheat.jpg"],
["Wheat Flour",55,"wheat-flour.jpg"],
["Jowar",60,"jowar.jpg"],
["Jowar Flour",70,"jowar-flour.jpg"],
["Foxtail",90,"foxtail.jpg"],
["Little",95,"little.jpg"],
["Kodo",100,"kodo.jpg"],
["Barnyard",105,"barnyard.jpg"],
["Proso",90,"proso.jpg"],
["Bajra",60,"bajra.jpg"],
["Ragi",70,"ragi.jpg"]
];

items.forEach((x,i)=>{
document.write(`
<div class="card">
<img src="${x[2]}">
<h4>${x[0]} - ₹${x[1]}/kg</h4>

<select id="q${i}">
<option>1</option>
<option selected>5</option>
<option>10</option>
</select>

<select id="u${i}">
<option>1</option>
<option>2</option>
<option>3</option>
</select>

<button id="b${i}" onclick="toggle(${i},'${x[0]}',${x[1]})">Add</button>
</div>
`);
});
</script>

</div>
</section>

<section>

<h3>Cart 🛒</h3>
<div class="cart" id="cart">Cart empty</div>
<p>Total ₹<span id="total">0</span></p>

<h3>Customer Details</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone (required)">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Place Order</button>

</section>

<script>
let cart=[];

function toggle(i,name,price){
let q=parseInt(document.getElementById("q"+i).value);
let u=parseInt(document.getElementById("u"+i).value);
let b=document.getElementById("b"+i);

let idx=cart.findIndex(x=>x.name==name);

if(idx!=-1){
cart.splice(idx,1);
b.innerText="Add";
b.classList.remove("added");
}else{
cart.push({name,price,q,u});
b.innerText="Added";
b.classList.add("added");
}

render();
}

function render(){
let html="";
let total=0;

cart.forEach((x,i)=>{
let v=x.price*x.q*x.u;
total+=v;

html+=`
<div class="cart-row">
<span>${x.name} (${x.q}kg x ${x.u}) ₹${v}</span>
<button class="del" onclick="removeItem(${i})">x</button>
</div>`;
});

document.getElementById("cart").innerHTML=html||"Cart empty";
document.getElementById("total").innerText=total;
}

function removeItem(i){
cart.splice(i,1);
render();
}

function placeOrder(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

if(!phone) return alert("Phone required");
if(cart.length==0) return alert("Cart empty");

let orderId="ORD"+Date.now();
let total=document.getElementById("total").innerText;

fetch("YOUR_SCRIPT_URL",{
method:"POST",
body:JSON.stringify({
name,phone,address,cart,total,orderId
})
})
.then(res=>res.text())
.then(()=>{
alert("Order placed successfully!");
})
.catch(()=>{
alert("Error saving order");
});

}
</script>

</body>
</html>
