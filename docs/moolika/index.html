<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods</title>

<style>
body{
  font-family:Arial;margin:0;background:#f5f5f5;
  padding-bottom:80px; /* space for mini cart */
}

/* HEADER */
.header{
  background:#004d40;color:white;padding:14px;text-align:center;
  font-size:20px;font-weight:bold;
}

.hero{
  background:#e8f5e9;padding:12px;text-align:center;font-size:14px;
}

/* PRODUCTS */
.section{padding:10px;}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.card{
  background:white;padding:10px;border-radius:10px;text-align:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
button{
  padding:6px;border:none;background:#004d40;color:white;border-radius:5px;
}

/* MINI CART BAR */
#miniCart{
  position:fixed;
  bottom:0;
  width:100%;
  background:#004d40;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
}

/* FULL CART PANEL */
.cart{
  position:fixed;
  bottom:60px;
  width:100%;
  background:white;
  max-height:60vh;
  overflow:auto;
  box-shadow:0 -2px 8px rgba(0,0,0,0.2);
  display:none;
  padding:10px;
}

input,textarea{
  width:100%;padding:6px;margin:4px 0;border-radius:5px;border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="header">🌿 MOOLIKA FOODS</div>

<div class="hero">
From Soil to Table — Naturally<br>
Connecting Farmers, Nature & Consumers through honest, natural food.
</div>

<div class="section">
<h3>Products</h3>
<div id="products" class="grid"></div>
</div>

<!-- FULL CART -->
<div class="cart" id="cartBox">
<div id="cart"></div>
<p>Total ₹<span id="total">0</span></p>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">🛒 Order Fresh Now</button>
</div>

<!-- MINI CART -->
<div id="miniCart">
<span>🛒 ₹<span id="miniTotal">0</span></span>
<button onclick="toggleCart()" style="background:white;color:#004d40;">
View Cart
</button>
</div>

<script>

/* PRODUCTS */
var products=[
{ name:"Rice", price:60 },
{ name:"Wheat", price:50 },
{ name:"Toor Dal", price:120 },
{ name:"Ragi", price:70 },
{ name:"Groundnut Oil", price:180 },
{ name:"Jaggery", price:60 }
];

/* CART FUNCTIONS */
function getCart(){
  return JSON.parse(localStorage.getItem("cart")||"{}");
}

function saveCart(c){
  localStorage.setItem("cart",JSON.stringify(c));
  renderCart();
}

function addItem(name,price){
  var c=getCart();
  c[name]=c[name]||{name:name,price:price,qty:0};
  c[name].qty++;
  saveCart(c);
}

function changeQty(k,d){
  var c=getCart();
  c[k].qty+=d;
  if(c[k].qty<=0) delete c[k];
  saveCart(c);
}

/* RENDER CART */
function renderCart(){

  var c=getCart(),h="",t=0;

  for(var k in c){
    var i=c[k];
    var amt=i.price*i.qty;
    t+=amt;

    h+="<div style='border-bottom:1px solid #ddd;padding:5px 0'>";
    h+="<b>"+i.name+"</b><br>";
    h+="<button onclick=\"changeQty('"+k+"',-1)\">-</button> ";
    h+=i.qty;
    h+=" <button onclick=\"changeQty('"+k+"',1)\">+</button>";
    h+=" ₹"+amt+" ";
    h+="<button onclick=\"changeQty('"+k+"',-999)\">X</button>";
    h+="</div>";
  }

  document.getElementById("cart").innerHTML=h||"Empty";
  document.getElementById("total").innerHTML=t;
  document.getElementById("miniTotal").innerHTML=t;
}

/* LOAD PRODUCTS */
function loadProducts(){
  var h="";
  for(var i=0;i<products.length;i++){
    var p=products[i];
    h+="<div class='card'>";
    h+="<b>"+p.name+"</b><br>₹"+p.price+"<br>";
    h+="<button onclick=\"addItem('"+p.name+"',"+p.price+")\">Add</button>";
    h+="</div>";
  }
  document.getElementById("products").innerHTML=h;
}

/* TOGGLE CART */
function toggleCart(){
  var c=document.getElementById("cartBox");
  c.style.display = (c.style.display==="block") ? "none" : "block";
}

/* GOOGLE SHEET ORDER */
function placeOrder(){

  var name=document.getElementById("name").value.trim();
  var phone=document.getElementById("phone").value.trim();
  var address=document.getElementById("address").value.trim();

  if(!name||!phone||!address){
    alert("Fill all details");
    return;
  }

  var c=getCart(),text="",total=0;

  for(var k in c){
    var i=c[k];
    var amt=i.price*i.qty;
    total+=amt;
    text+=i.name+" x "+i.qty+", ";
  }

  var orderId="ORD"+Date.now();

  /* 🔁 PUT YOUR GOOGLE SCRIPT URL BELOW */
  var url="https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec"
  +"?orderId="+encodeURIComponent(orderId)
  +"&name="+encodeURIComponent(name)
  +"&phone="+encodeURIComponent(phone)
  +"&address="+encodeURIComponent(address)
  +"&cart="+encodeURIComponent(text)
  +"&total="+encodeURIComponent(total);

  alert("Order placed: "+orderId);

  fetch(url,{method:"GET",mode:"no-cors"}).catch(()=>{});

  localStorage.removeItem("cart");
  renderCart();
}

/* INIT */
loadProducts();
renderCart();

</script>

</body>
</html>
