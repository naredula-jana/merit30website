<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods v39</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}

header{
background:#004d40;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
}

.hero{
background:#c8e6c9;
text-align:center;
padding:10px;
font-weight:bold;
}

.filters{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
padding:10px;
}

.filters button{
padding:8px;
border:none;
background:#004d40;
color:white;
border-radius:6px;
}

.section{
padding:10px;
font-weight:bold;
color:#004d40;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
height:80px;
object-fit:cover;
border-radius:6px;
}

.price{font-weight:bold;color:#004d40;}

button{
width:100%;
padding:6px;
margin-top:5px;
background:#004d40;
color:white;
border:none;
border-radius:5px;
}

.cart{
background:white;
margin:10px;
padding:10px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<header>
<div>🌿 MOOLIKA FOODS</div>
<div>📞 99999-00039</div>
</header>

<div class="hero">
Healthy • Affordable • Diabetic Friendly
</div>

<div class="filters">
<button onclick="setFilter('all')">All</button>
<button onclick="setFilter('organic')">🌿 Organic</button>
<button onclick="setFilter('budget')">💰 Budget</button>
<button onclick="setFilter('diabetic')">🩺 Diabetic</button>
</div>

<div id="products"></div>

<div class="cart">
<h3>Cart 🛒</h3>
<div id="cart">Empty</div>
<p>Total ₹<span id="total">0</span></p>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Place Order</button>
</div>

<script>

// AGENT
var agentId="DIRECT";
if(window.location.search.indexOf("agent=")!==-1){
agentId=window.location.search.split("agent=")[1].split("&")[0];
}

var currentFilter="all";
var cart={};

// CATEGORY DATA
var categories=[

{
name:"🌾 Grains",
items:[
["Rice",60,"rice.jpg",true,false],
["Wheat",50,"wheat.jpg",false,false],
["Jowar",60,"jowar.jpg",true,true]
]
},

{
name:"🌿 Millets",
items:[
["Ragi",70,"ragi.jpg",true,true],
["Foxtail",90,"foxtail.jpg",true,true]
]
},

{
name:"🛢️ Oils",
items:[
["Groundnut Oil",180,"groundnut.jpg",true,true],
["Coconut Oil",200,"coconut.jpg",true,true]
]
},

{
name:"🍯 Misc",
items:[
["Jaggery",60,"jaggery.jpg",true,true],
["Honey",300,"honey.jpg",true,true]
]
}

];

// RENDER
function render(){

var html="";

for(var c=0;c<categories.length;c++){

html+=`<div class="section">${categories[c].name}</div>`;
html+=`<div class="grid">`;

for(var i=0;i<categories[c].items.length;i++){

var p=categories[c].items[i];

// FILTER
if(currentFilter==="organic" && !p[3]) continue;
if(currentFilter==="budget" && p[1]>70) continue;
if(currentFilter==="diabetic" && !p[4]) continue;

html+=`
<div class="card">
<img src="${p[2]}" onerror="this.style.display='none'">
<b>${p[0]}</b>
<div class="price">₹${p[1]}</div>
<button onclick="addItem('${p[0]}',${p[1]})">Add</button>
</div>
`;
}

html+=`</div>`;
}

document.getElementById("products").innerHTML=html;
}

// FILTER
function setFilter(type){
currentFilter=type;
render();
}

// CART
function addItem(name,price){

if(cart[name]){
cart[name].qty++;
}else{
cart[name]={price:price,qty:1};
}

renderCart();
}

function renderCart(){

var html="";
var total=0;

for(var name in cart){

var item=cart[name];
var t=item.price*item.qty;
total+=t;

html+=`${name} x ${item.qty} = ₹${t}<br>`;
}

document.getElementById("cart").innerHTML=html||"Empty";
document.getElementById("total").innerHTML=total;
}

function getCartDetails(){

var text="";
for(var name in cart){
var item=cart[name];
text+=name+" x "+item.qty+", ";
}
return text;
}

// ORDER
function placeOrder(){

var name=document.getElementById("name").value;
var phone=document.getElementById("phone").value;
var address=document.getElementById("address").value;

if(!name||!phone||!address){
alert("Fill all details");
return;
}

var cartDetails=getCartDetails();
if(!cartDetails){
alert("Cart empty");
return;
}

var orderId="ORD"+new Date().getTime();

var url="https://script.google.com/macros/s/AKfycbyiSzKMSOQzxYceiq6_vUh5P82zF2OtATCi2DOAuUzOKxSvyII0pGeTrlSL2_JHP0I/exec"
+"?orderId="+encodeURIComponent(orderId)
+"&name="+encodeURIComponent(name)
+"&phone="+encodeURIComponent(phone)
+"&address="+encodeURIComponent(address)
+"&cart="+encodeURIComponent(cartDetails)
+"&total="+encodeURIComponent(document.getElementById("total").innerHTML)
+"&agentId="+encodeURIComponent(agentId);

new Image().src=url;

alert("Order placed "+orderId);

cart={};
renderCart();
}

// INIT
render();

</script>

</body>
</html>
