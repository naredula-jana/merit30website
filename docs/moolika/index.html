<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moolika Foods</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}

.header{
background:#004d40;color:white;padding:15px;text-align:center;
font-size:20px;font-weight:bold;
}

.hero{
background:#e8f5e9;padding:15px;text-align:center;
font-size:14px;
}

.section{padding:15px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.card{
background:white;padding:10px;border-radius:10px;text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.cart{
position:fixed;bottom:0;width:100%;background:white;padding:10px;
box-shadow:0 -2px 8px rgba(0,0,0,0.2);
}

button{
padding:6px;background:#004d40;color:white;border:none;border-radius:5px;
}

input,textarea{
width:100%;padding:6px;margin:4px 0;border-radius:5px;border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="header">🌿 MOOLIKA FOODS</div>

<div class="hero">
From Soil to Table — Naturally <br>
Connecting Farmers, Nature & Consumers through honest, natural food.
</div>

<div class="section">
<h3>Our Promise</h3>
<div style="display:flex;justify-content:space-between;font-size:13px;">
<span>🌿 Natural Farming</span>
<span>⚙️ Value-Added</span>
<span>✅ Trusted Quality</span>
</div>
</div>

<div class="section">
<h3>Products</h3>
<div id="products" class="grid"></div>
</div>

<div class="cart">
<div id="cart"></div>
<p>Total ₹<span id="total">0</span></p>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Place Order</button>
</div>

<script>

var products=[
{ name:"Rice", price:60 },
{ name:"Wheat", price:50 },
{ name:"Toor Dal", price:120 },
{ name:"Ragi", price:70 },
{ name:"Groundnut Oil", price:180 },
{ name:"Jaggery", price:60 }
];

function getCart(){return JSON.parse(localStorage.getItem("cart")||"{}");}
function saveCart(c){localStorage.setItem("cart",JSON.stringify(c));renderCart();}

function addItem(name,price){
var c=getCart();
c[name]=c[name]||{name,price,qty:0};
c[name].qty++;
saveCart(c);
}

function changeQty(k,d){
var c=getCart();
c[k].qty+=d;
if(c[k].qty<=0) delete c[k];
saveCart(c);
}

function renderCart(){
var c=getCart(),h="",t=0;

for(var k in c){
var i=c[k];
var amt=i.price*i.qty;
t+=amt;

h+=i.name+" ";
h+="<button onclick=\"changeQty('"+k+"',-1)\">-</button>";
h+=i.qty;
h+="<button onclick=\"changeQty('"+k+"',1)\">+</button>";
h+=" ₹"+amt+" ";
h+="<button onclick=\"changeQty('"+k+"',-999)\">X</button><br>";
}

document.getElementById("cart").innerHTML=h||"Empty";
document.getElementById("total").innerHTML=t;
}

function loadProducts(){
var h="";
for(var i=0;i<products.length;i++){
var p=products[i];
h+="<div class='card'>";
h+="<b>"+p.name+"</b><br>₹"+p.price+"<br>";
h+="<button onclick=\"addItem('"+p.name+"',"+p.price+")\">Add</button>";
h+="</div>";
}
document.getElementById("products").innerHTML=h;
}

function placeOrder(){

var name=document.getElementById("name").value;
var phone=document.getElementById("phone").value;
var address=document.getElementById("address").value;

if(!name||!phone||!address){
alert("Fill all details");
return;
}

alert("Order placed successfully");

localStorage.removeItem("cart");
renderCart();
}

loadProducts();
renderCart();

</script>

</body>
</html>
