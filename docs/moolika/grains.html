<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grains - Moolika</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
header{background:#004d40;color:white;padding:12px;display:flex;justify-content:space-between;}
.nav{display:flex;gap:10px;padding:10px;background:#e0f2f1;justify-content:center;}
.nav a{text-decoration:none;color:#004d40;font-weight:bold;}
.section{padding:10px;font-weight:bold;color:#004d40;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px;}
.card{background:white;padding:10px;border-radius:10px;text-align:center;}
.price{font-weight:bold;color:#004d40;}
button{width:100%;padding:6px;margin-top:5px;background:#004d40;color:white;border:none;border-radius:5px;}
.cart{background:white;margin:10px;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<header>
<div>🌿 MOOLIKA FOODS</div>
<div>📞 99999-00045</div>
</header>

<div class="nav">
<a href="index.html">Home</a>
<a href="grains.html">Grains</a>
</div>

<div id="products"></div>

<div class="cart">
<h3>Cart</h3>
<div id="cart"></div>
<p>Total ₹<span id="total">0</span></p>
</div>

<script src="products.js"></script>

<script>

// LOAD CART
var cart = JSON.parse(localStorage.getItem("cart") || "{}");

// RENDER GRAINS ONLY
function render(){

var html="";
var items = allProducts.filter(p => p.category === "grains");

html+=`<div class="section">GRAINS & PULSES</div><div class="grid">`;

for(var i=0;i<items.length;i++){

var p=items[i];

var options="";
for(var j=0;j<p.sizes.length;j++){
options+=`<option value="${p.sizes[j]}">${p.sizes[j]}kg</option>`;
}

html+=`
<div class="card">
<b>${p.name}</b>
<div class="price">₹${p.price}/kg</div>

<select id="size_${p.name}">${options}</select>

<button onclick="addItem('${p.name}',${p.price})">Add</button>
</div>
`;
}

html+=`</div>`;

document.getElementById("products").innerHTML=html;
}

// ADD ITEM
function addItem(name,price){

var size=document.getElementById("size_"+name).value;
var key=name+"_"+size;

if(cart[key]){
cart[key].qty++;
}else{
cart[key]={name:name,size:size,price:price,qty:1};
}

saveCart();
}

// SAVE CART
function saveCart(){
localStorage.setItem("cart", JSON.stringify(cart));
renderCart();
}

// RENDER CART
function renderCart(){

var html="",total=0;

for(var k in cart){

var i=cart[k];
var t=i.price*i.size*i.qty;
total+=t;

html+=`${i.name}(${i.size}) x ${i.qty}<br>`;
}

document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerHTML=total;
}

// INIT
render();
renderCart();

</script>

</body>
</html>
