<!-- SAME STRUCTURE -->

<script>
loadHeader();

var cart = JSON.parse(localStorage.getItem("cart")||{});

function render(){
var html="";
var items = allProducts.filter(p=>p.category==="misc");

html+=`<div class="section">🍯 MISC</div><div class="grid">`;

for(var p of items){
var options=p.sizes.map(s=>`<option>${s}kg</option>`).join("");

html+=`
<div class="card">
<b>${p.name}</b>
<div class="price">₹${p.price}</div>
<select id="size_${p.name}">${options}</select>
<button onclick="addItem('${p.name}',${p.price})">Add</button>
</div>`;
}

html+="</div>";
products.innerHTML=html;
}
</script>
