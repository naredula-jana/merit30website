<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Products</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;padding-bottom:80px;}

.header{
position:sticky;top:0;background:#004d40;color:white;
display:flex;align-items:center;height:40px;
}
.menu-icon{position:absolute;left:10px;font-size:20px;cursor:pointer;}
.title{width:100%;text-align:center;}

.dropdown{
position:fixed;top:0;left:-260px;width:220px;height:100%;
background:white;transition:0.3s;padding-top:50px;
}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px;}
.card{background:white;padding:10px;text-align:center;}
.card img{width:100%;height:90px;object-fit:cover;}

button{padding:6px;background:#004d40;color:white;border:none;}

.cart{
position:fixed;bottom:60px;width:100%;
background:white;max-height:60vh;overflow:auto;
display:none;padding:10px;
}

#miniCart{
position:fixed;bottom:0;width:100%;
background:#004d40;color:white;padding:10px;
display:flex;justify-content:space-between;
}
</style>
</head>

<body>

<div class="header">
<div class="menu-icon" onclick="toggleMenu()">☰</div>
<div class="title">🌿 Moolika Foods — From Soil to Table</div>
</div>

<div id="menu" class="dropdown">
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="about.html">About</a>
</div>

<h2 style="text-align:center;">Products</h2>
<div id="productsList" class="grid"></div>

<div class="cart" id="cartBox">
<div id="cart"></div>
<p>Total ₹<span id="total">0</span></p>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Order</button>
</div>

<div id="miniCart">
<span>🛒 ₹<span id="miniTotal">0</span></span>
<button onclick="toggleCart()">Cart</button>
</div>

<script>
function toggleMenu(){
var m=document.getElementById("menu");
m.style.left=(m.style.left==="0px")?"-260px":"0px";
}

function toggleCart(){
var c=document.getElementById("cartBox");
c.style.display=(c.style.display==="block")?"none":"block";
}

var products=[
{ name:"Rice", price:60, img:"rice.jpg" },
{ name:"Wheat", price:50, img:"wheat.jpg" },
{ name:"Ragi", price:70, img:"ragi.jpg" }
];

var h="";
products.forEach(p=>{
h+=`<div class="card">
<img src="${p.img}">
<b>${p.name}</b><br>₹${p.price}<br>
<button onclick="addItem('${p.name}',${p.price})">Add</button>
</div>`;
});
productsList.innerHTML=h;

/* CART */
function getCart(){return JSON.parse(localStorage.getItem("cart")||"{}");}
function saveCart(c){localStorage.setItem("cart",JSON.stringify(c));renderCart();}
function addItem(n,p){
var c=getCart();
c[n]=c[n]||{name:n,price:p,qty:0};
c[n].qty++;
saveCart(c);
}
function renderCart(){
var c=getCart(),t=0,h="";
for(var k in c){
var i=c[k]; var amt=i.price*i.qty;
t+=amt; h+=`${i.name} ${i.qty} ₹${amt}<br>`;
}
cart.innerHTML=h||"Empty";
total.innerHTML=t;
miniTotal.innerHTML=t;
}
function placeOrder(){
alert("Order placed");
localStorage.removeItem("cart");
renderCart();
}
renderCart();
</script>

</body>
</html>
