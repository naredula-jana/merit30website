<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Products</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

.header{
background:#004d40;color:#fff;height:40px;
display:flex;align-items:center;
}
.menu{position:absolute;left:10px;font-size:20px;cursor:pointer;}
.title{text-align:center;width:100%;}

.dropdown{
position:fixed;top:0;left:-220px;width:200px;height:100%;
background:#fff;transition:.3s;padding-top:40px;
z-index:2000;
}

.dropdown a{
display:block;padding:12px;
color:#004d40;text-decoration:none;
border-bottom:1px solid #eee;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
padding:8px;
}

.card{
background:#fff;
padding:8px;
text-align:center;
border-radius:6px;
}

.card img{
width:100%;
height:90px;
object-fit:cover;
border-radius:5px;
}

button{
background:#004d40;color:#fff;border:none;
padding:6px;margin:2px;
}

/* CART */
.cart{
position:fixed;
bottom:70px;
width:100%;
background:#fff;
display:none;
padding:10px;
box-shadow:0 -2px 8px rgba(0,0,0,0.2);
}

#mini{
position:fixed;
bottom:0;
width:100%;
background:#004d40;
color:#fff;
padding:10px;
display:flex;
justify-content:center;
gap:20px;
}
</style>
</head>

<body>

<div class="header">
<div class="menu" onclick="menu()">☰</div>
<div class="title">Moolika Foods</div>
</div>

<div id="menuBox" class="dropdown">
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="about.html">About</a>
</div>

<div id="list" class="grid"></div>

<div class="cart" id="cartBox">
<div id="cart"></div>
<p><b>Total ₹<span id="total">0</span></b></p>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<button onclick="order()">Place Order</button>
</div>

<div id="mini">
<span>₹ <span id="totalMini">0</span></span>
<button onclick="toggle()">View Cart</button>
</div>

<script>

function menu(){
var m=document.getElementById("menuBox");
m.style.left=(m.style.left==="0px")?"-220px":"0px";
}

function toggle(){
var c=document.getElementById("cartBox");
c.style.display=(c.style.display==="block")?"none":"block";
}

/* PRODUCTS WITH IMAGES */
var p=[
{name:"Rice",price:60,img:"rice.jpg"},
{name:"Wheat",price:50,img:"wheat.jpg"},
{name:"Ragi",price:70,img:"ragi.jpg"},
{name:"Bajra",price:80,img:"bajra.jpg"},
{name:"Foxtail",price:90,img:"foxtail.jpg"}
];

var h="";
p.forEach(x=>{
h+=`<div class="card">
<img src="${x.img}">
<b>${x.name}</b><br>
₹${x.price}<br>
<button onclick="add('${x.name}',${x.price})">Add</button>
</div>`;
});
document.getElementById("list").innerHTML=h;

/* CART */
function getCart(){return JSON.parse(localStorage.cart||"{}");}

function add(n,p){
var c=getCart();
c[n]=c[n]||{p:Number(p),q:0};
c[n].q++;
localStorage.cart=JSON.stringify(c);
render();
}

function render(){
var c=getCart(),t=0,h="";
for(var k in c){
var i=c[k];
var amt=(i.p||0)*(i.q||0);
t+=amt;

h+=`${k} x ${i.q} ₹${amt}<br>`;
}
cart.innerHTML=h||"Empty";
total.innerHTML=t;
totalMini.innerHTML=t;
}

render();

/* ORDER */
function order(){
alert("Order placed");
localStorage.removeItem("cart");
render();
}
</script>

</body>
</html>
