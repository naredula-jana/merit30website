<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Products</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

.header{
background:#004d40;color:#fff;height:40px;
display:flex;align-items:center;
}
.menu{position:absolute;left:10px;font-size:20px;cursor:pointer;}
.title{text-align:center;width:100%;}

.dropdown{
position:fixed;top:0;left:-220px;width:200px;height:100%;
background:#fff;transition:.3s;padding-top:40px;
z-index:2000;
}

.dropdown a{
display:block;padding:12px;
color:#004d40;text-decoration:none;
border-bottom:1px solid #eee;
}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px;}
.card{background:#fff;padding:8px;text-align:center;}

.cart{
position:fixed;bottom:60px;width:100%;
background:#fff;display:none;padding:10px;
}

#mini{
position:fixed;bottom:0;width:100%;
background:#004d40;color:#fff;padding:10px;
display:flex;justify-content:space-between;
}
</style>
</head>

<body>

<div class="header">
<div class="menu" onclick="menu()">☰</div>
<div class="title">Moolika Foods</div>
</div>

<div id="menuBox" class="dropdown">
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="about.html">About</a>
</div>

<div id="list" class="grid"></div>

<div class="cart" id="cartBox">
<div id="cart"></div>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<button onclick="order()">Place Order</button>
</div>

<div id="mini">
<span>₹ <span id="total">0</span></span>
<button onclick="toggle()">Cart</button>
</div>

<script>

function menu(){
var m=document.getElementById("menuBox");
m.style.left=(m.style.left==="0px")?"-220px":"0px";
}

function toggle(){
var c=document.getElementById("cartBox");
c.style.display=(c.style.display==="block")?"none":"block";
}

var p=[
{name:"Rice",price:60},
{name:"Wheat",price:50}
];

var h="";
p.forEach(x=>{
h+=`<div class="card">
${x.name}<br>₹${x.price}<br>
<button onclick="add('${x.name}',${x.price})">Add</button>
</div>`;
});
list.innerHTML=h;

/* CART */
function getCart(){return JSON.parse(localStorage.cart||"{}");}

function add(n,p){
var c=getCart();
c[n]=c[n]||{p:p,q:0};
c[n].q++;
localStorage.cart=JSON.stringify(c);
render();
}

function render(){
var c=getCart(),t=0,h="";
for(var k in c){
t+=c[k].p*c[k].q;
h+=`${k} x ${c[k].q}<br>`;
}
cart.innerHTML=h;
total.innerHTML=t;
}
render();

/* GOOGLE SHEET */
function order(){

var name=document.getElementById("name").value;
var phone=document.getElementById("phone").value;

if(!name || !phone){
alert("Enter details");
return;
}

var c=getCart(),text="",totalAmt=0;

for(var k in c){
totalAmt+=c[k].p*c[k].q;
text+=k+" x "+c[k].q+", ";
}

var url="https://script.google.com/macros/s/AKfycbyiSzKMSOQzxYceiq6_vUh5P82zF2OtATCi2DOAuUzOKxSvyII0pGeTrlSL2_JHP0I/exec"
+"?name="+encodeURIComponent(name)
+"&phone="+phone
+"&cart="+encodeURIComponent(text)
+"&total="+totalAmt;

fetch(url)
.then(()=>alert("Order submitted"))
.catch(()=>alert("Error"));

localStorage.clear();
render();
}
</script>

</body>
</html>
