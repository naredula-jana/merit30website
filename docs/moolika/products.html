<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Products - Moolika Foods</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;padding-bottom:80px;}

.header{
  position:sticky;
  top:0;
  z-index:1000;
  background:#004d40;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:50px;
}

.menu-icon{
  position:absolute;
  left:12px;
  font-size:22px;
  cursor:pointer;
}

.dropdown{
  position:fixed;
  top:0;
  left:-260px;
  width:220px;
  height:100%;
  background:white;
  box-shadow:2px 0 8px rgba(0,0,0,0.2);
  transition:0.3s;
  z-index:2000;
  padding-top:60px;
}

.dropdown a{
  display:block;
  padding:14px;
  text-decoration:none;
  color:#004d40;
  border-bottom:1px solid #eee;
}

.hero{
  background:#e8f5e9;
  padding:12px;
  text-align:center;
  font-size:14px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.card img{
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:8px;
}

button{
  padding:6px;
  background:#004d40;
  color:white;
  border:none;
}

</style>
</head>

<body>

<div class="header">
  <div class="menu-icon" onclick="toggleMenu()">☰</div>
  🌿 MOOLIKA FOODS
</div>

<div id="menu" class="dropdown">
  <a href="index.html">🏠 Home</a>
  <a href="products.html">🛒 Products</a>
  <a href="about.html">ℹ️ About</a>
</div>

<div class="hero">
From Soil to Table — Naturally<br>
Connecting Farmers, Nature & Consumers through honest, natural food.
</div>

<div id="productsList" class="grid"></div>

<script>

function toggleMenu(){
  var m=document.getElementById("menu");
  m.style.left = (m.style.left==="0px")?"-260px":"0px";
}

var products=[
{ name:"Rice", price:60, img:"rice.jpg" },
{ name:"Wheat", price:50, img:"wheat.jpg" },
{ name:"Ragi", price:70, img:"ragi.jpg" },
{ name:"Bajra", price:80, img:"bajra.jpg" }
];

var h="";
products.forEach(p=>{
h+=`<div class="card">
<img src="${p.img}">
<b>${p.name}</b><br>₹${p.price}/kg<br>
<button>Add</button>
</div>`;
});

document.getElementById("productsList").innerHTML=h;

</script>

</body>
</html>
