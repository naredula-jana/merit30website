<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moolika Food</title>

<style>
body { font-family: Arial; margin:0; }
header { background:#2e7d32; color:white; text-align:center; padding:20px; }
section { padding:30px; max-width:1000px; margin:auto; }

.hero { background:#e8f5e9; text-align:center; padding:40px; }

.products { display:flex; flex-wrap:wrap; gap:20px; }
.card {
    flex:1;
    min-width:250px;
    background:#f4f4f4;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

button {
    background:#2e7d32;
    color:white;
    padding:8px 12px;
    border:none;
    cursor:pointer;
    margin-top:10px;
}

.cart {
    background:#f9f9f9;
    padding:15px;
    border-radius:10px;
}

.cart-item {
    display:flex;
    justify-content:space-between;
    margin:5px 0;
}

.total {
    font-weight:bold;
    margin-top:10px;
}

input, textarea {
    width:100%;
    margin:10px 0;
    padding:10px;
}

footer {
    background:#2e7d32;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>

<body>

<header>
<h1>Moolika Food 🌿</h1>
<p>Natural. Pure. Sustainable.</p>
</header>

<section class="hero">
<h2>From Soil to Soul</h2>
<p>Select products and place your order</p>
</section>

<section>
<h2>Products</h2>

<div class="products">

<div class="card">
<h3>Sona Masuri Rice</h3>
<p>₹60/kg</p>
<input type="number" id="qty1">
<button onclick="addToCart('Sona Masuri Rice',60,'qty1')">Add</button>
</div>

<div class="card">
<h3>Brown Rice</h3>
<p>₹80/kg</p>
<input type="number" id="qty2">
<button onclick="addToCart('Brown Rice',80,'qty2')">Add</button>
</div>

<div class="card">
<h3>Jowar Flour</h3>
<p>₹70/kg</p>
<input type="number" id="qty3">
<button onclick="addToCart('Jowar Flour',70,'qty3')">Add</button>
</div>

<div class="card">
<h3>Foxtail Millet</h3>
<p>₹90/kg</p>
<input type="number" id="qty4">
<button onclick="addToCart('Foxtail Millet',90,'qty4')">Add</button>
</div>

</div>
</section>

<section>
<h2>Cart 🛒</h2>

<div class="cart" id="cart"></div>

<p class="total">Total: ₹<span id="total">0</span></p>

<h3>Customer Details</h3>

<input type="text" id="name" placeholder="Name">
<input type="tel" id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Place Order</button>

</section>

<footer>
<p>© 2026 Moolika Food</p>
</footer>

<script>
let cart = [];

function addToCart(name, price, qtyId) {
    const qty = document.getElementById(qtyId).value;
    if (!qty || qty <= 0) return alert("Enter quantity");
    cart.push({name, price, qty});
    renderCart();
}

function renderCart() {
    const cartDiv = document.getElementById('cart');
    cartDiv.innerHTML = "";
    let total = 0;

    cart.forEach((item, index) => {
        total += item.price * item.qty;
        cartDiv.innerHTML += `
        <div class="cart-item">
            ${item.name} (${item.qty}kg) - ₹${item.price * item.qty}
            <button onclick="removeItem(${index})">X</button>
        </div>`;
    });

    document.getElementById('total').innerText = total;
}

function removeItem(index) {
    cart.splice(index, 1);
    renderCart();
}

function placeOrder() {
    const name = document.getElementById('name').value;
    const phone = document.getElementById('phone').value;
    const address = document.getElementById('address').value;

    if (cart.length === 0) return alert("Cart is empty");

    let message = "New Order - Moolika Food 🌿\n\n";

    cart.forEach(item => {
        message += `${item.name} - ${item.qty}kg = ₹${item.price * item.qty}\n`;
    });

    const total = document.getElementById('total').innerText;

    message += `\nTotal: ₹${total}\n\nName: ${name}\nPhone: ${phone}\nAddress: ${address}`;

    // ✅ GOOGLE SHEET SAVE
    fetch("https://script.google.com/macros/s/AKfycbxeXUF1CpHXzstZIdx_cV3cT1WLUtYhBWedCYHCP-OFp8hYDH--sk2PMTtfxF5obmR5qQ/exec", {
        method: "POST",
        body: JSON.stringify({name, phone, address, cart, total})
    });

    //const url = `https://wa.me/YOUR_WHATSAPP_NUMBER?text=${encodeURIComponent(message)}`;
    //window.open(url, '_blank');
}
</script>

</body>
</html>
